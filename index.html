<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Redes Literárias</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-brand-blue { background-color: #003b49; }
        .text-brand-blue { color: #003b49; }
        .bg-brand-yellow { background-color: #f8b417; }
        .text-brand-yellow { color: #f8b417; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBjGF-lwJt1Lk7zlEZou42zQRiUOfPlh24",
            authDomain: "redes-literarias-rso.firebaseapp.com",
            databaseURL: "https://redes-literarias-rso-default-rtdb.firebaseio.com",
            projectId: "redes-literarias-rso",
            storageBucket: "redes-literarias-rso.firebasestorage.app",
            messagingSenderId: "469426150346",
            appId: "1:469426150346:web:bec753b21cf64b7eca8d33"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        window.db = db; // Global access just in case

        function App() {
            const [view, setView] = useState('login');
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [activities, setActivities] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribeUsers = db.collection("users").onSnapshot(snapshot => {
                    const usersData = snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() }));
                    setUsers(usersData);
                }, err => console.error("Erro users:", err));

                const unsubscribeActivities = db.collection("activities").onSnapshot(snapshot => {
                    const actData = snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() }));
                    setActivities(actData);
                    setLoading(false);
                }, err => {
                    console.error("Erro activities:", err);
                    setLoading(false);
                });

                return () => {
                    unsubscribeUsers();
                    unsubscribeActivities();
                };
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center bg-brand-blue text-white font-bold text-xl"><i className="fas fa-spinner fa-spin mr-3"></i> Conectando ao Banco de Dados...</div>;

            if (view === 'login') return <LoginScreen setView={setView} users={users} setCurrentUser={setCurrentUser} />;
            if (view === 'register') return <RegisterScreen setView={setView} />;
            if (view === 'user') return <UserDashboard user={currentUser} setView={setView} activities={activities} />;
            if (view === 'admin') return <AdminDashboard setView={setView} users={users} activities={activities} />;
            
            return <div>Erro de Rota</div>;
        }

        function LoginScreen({ setView, users, setCurrentUser }) {
            const [mode, setMode] = useState('user');
            const [loginData, setLoginData] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [msg, setMsg] = useState('');
            const deadline = new Date('2026-07-31T23:59:59-03:00');
            const now = new Date();
            const isOpen = now <= deadline;

            const handleLogin = (e) => {
                e.preventDefault();
                setMsg('');
                if (mode === 'admin') {
                    if (email === 'bibliotecaderemanso@gmail.com' && password === 'Rso.redes.2026#') {
                        setView('admin');
                    } else {
                        setMsg('Credenciais de administrador incorretas.');
                    }
                } else {
                    const user = users.find(u => u.registro === loginData || u.documento === loginData);
                    if (user) {
                        if (user.status === 'blocked') {
                            setMsg('Sua conta foi suspensa pela administração.');
                            return;
                        }
                        setCurrentUser(user);
                        setView('user');
                    } else {
                        setMsg('Leitor não encontrado. Verifique seu CPF ou Registro.');
                    }
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-brand-yellow">
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
                        <div className="p-8 bg-brand-blue text-white text-center rounded-b-[40px]">
                            <div className="w-24 h-24 mx-auto bg-white rounded-full flex items-center justify-center mb-4 p-2 shadow-lg">
                                <i className="fas fa-book-reader text-brand-blue text-4xl"></i>
                            </div>
                            <h1 className="text-2xl font-black">Desafio Redes Literárias</h1>
                            <p className="text-sm mt-1 text-gray-300">Biblioteca Délio Ledoux</p>
                        </div>
                        
                        <div className="flex border-b">
                            <button className={`flex-1 py-4 font-bold text-sm ${mode === 'user' ? 'text-brand-blue border-b-4 border-brand-blue' : 'text-gray-400'}`} onClick={() => { setMode('user'); setMsg(''); }}>SOU LEITOR</button>
                            <button className={`flex-1 py-4 font-bold text-sm ${mode === 'admin' ? 'text-brand-blue border-b-4 border-brand-blue' : 'text-gray-400'}`} onClick={() => { setMode('admin'); setMsg(''); }}>ADMINISTRAÇÃO</button>
                        </div>

                        <div className="p-8">
                            {msg && <div className="mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm font-bold text-center"><i className="fas fa-exclamation-triangle mr-2"></i> {msg}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                {mode === 'user' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">CPF ou Nº de Registro</label>
                                        <input type="text" value={loginData} onChange={e => setLoginData(e.target.value)} className="w-full p-4 bg-gray-50 border-2 rounded-xl focus:border-brand-blue outline-none transition" placeholder="Digite aqui..." required />
                                    </div>
                                ) : (
                                    <>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">E-mail Administrativo</label>
                                            <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-gray-50 border-2 rounded-xl focus:border-brand-blue outline-none transition" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Senha</label>
                                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-gray-50 border-2 rounded-xl focus:border-brand-blue outline-none transition" required />
                                        </div>
                                    </>
                                )}
                                <button type="submit" className="w-full bg-brand-blue text-white font-black py-4 rounded-xl hover:bg-opacity-90 shadow-lg transform active:scale-95 transition">
                                    ENTRAR NO PAINEL
                                </button>
                            </form>

                            {mode === 'user' && (
                                <div className="mt-6 text-center border-t pt-6">
                                    {isOpen ? (
                                        <>
                                            <p className="text-sm font-bold text-gray-500 mb-3">Ainda não participa do desafio?</p>
                                            <button onClick={() => setView('register')} className="w-full bg-brand-yellow text-brand-blue font-black py-4 rounded-xl hover:bg-yellow-500 shadow-md transform active:scale-95 transition">
                                                FAZER INSCRIÇÃO AGORA
                                            </button>
                                        </>
                                    ) : (
                                        <div className="bg-red-50 text-red-800 p-4 rounded-xl font-bold">
                                            <i className="fas fa-lock mr-2"></i> As inscrições foram encerradas.
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function RegisterScreen({ setView }) {
            const [form, setForm] = useState({ nome: '', documento: '', nascimento: '', endereco: '', telefone: '', respNome: '', respDoc: '', respTel: '' });
            const [foto, setFoto] = useState(null);
            const [msg, setMsg] = useState('');
            const [loading, setLoading] = useState(false);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFoto(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setMsg('');
                
                const nasc = new Date(form.nascimento);
                const age = new Date().getFullYear() - nasc.getFullYear();
                
                if (age < 11) {
                    setMsg('É necessário ter 11 anos ou mais para participar.');
                    return;
                }
                if (age < 18 && (!form.respNome || !form.respDoc || !form.respTel)) {
                    setMsg('Menores de 18 anos precisam preencher os dados do responsável.');
                    return;
                }
                if (!foto) {
                    setMsg('Por favor, adicione uma foto para sua carteirinha.');
                    return;
                }

                setLoading(true);
                const num = Math.floor(100000 + Math.random() * 900000);
                const registro = `RSO-${num}`;

                try {
                    await db.collection("users").add({
                        ...form,
                        foto,
                        idade: age,
                        registro,
                        status: 'active',
                        createdAt: new Date().toISOString()
                    });
                    alert(`Cadastro Realizado! Seu número de registro é ${registro}. Use-o para fazer login.`);
                    setView('login');
                } catch (err) {
                    setMsg('Erro ao salvar no banco de dados. Tente novamente.');
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 py-8">
                    <div className="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-8">
                        <button onClick={() => setView('login')} className="text-gray-500 font-bold mb-6 hover:text-brand-blue"><i className="fas fa-arrow-left mr-2"></i> Voltar ao Início</button>
                        <h2 className="text-3xl font-black text-brand-blue mb-8 border-b-4 border-brand-yellow pb-2 inline-block">Inscrição no Desafio</h2>
                        
                        {msg && <div className="mb-6 p-4 bg-red-100 text-red-700 rounded-xl font-bold border-l-4 border-red-500">{msg}</div>}
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-300 text-center">
                                {foto ? (
                                    <img src={foto} className="w-32 h-32 mx-auto rounded-full object-cover border-4 border-brand-yellow shadow-lg" />
                                ) : (
                                    <div className="w-32 h-32 mx-auto rounded-full bg-gray-200 flex items-center justify-center text-gray-400 mb-4"><i className="fas fa-camera text-4xl"></i></div>
                                )}
                                <label className="mt-4 inline-block bg-brand-blue text-white font-bold py-2 px-6 rounded-xl cursor-pointer hover:bg-opacity-90">
                                    <i className="fas fa-upload mr-2"></i> Adicionar Foto
                                    <input type="file" accept="image/*" onChange={handleImage} className="hidden" />
                                </label>
                                <p className="text-xs text-gray-500 mt-2 font-bold">Será usada na sua Carteirinha Oficial</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Nome Completo</label>
                                    <input type="text" required value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} className="w-full p-4 bg-gray-50 border-2 rounded-xl outline-none focus:border-brand-blue" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Data de Nascimento</label>
                                    <input type="date" required value={form.nascimento} onChange={e => setForm({...form, nascimento: e.target.value})} className="w-full p-4 bg-gray-50 border-2 rounded-xl outline-none focus:border-brand-blue" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">CPF ou RG</label>
                                    <input type="text" required value={form.documento} onChange={e => setForm({...form, documento: e.target.value})} className="w-full p-4 bg-gray-50 border-2 rounded-xl outline-none focus:border-brand-blue" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Endereço Completo</label>
                                    <input type="text" required value={form.endereco} onChange={e => setForm({...form, endereco: e.target.value})} className="w-full p-4 bg-gray-50 border-2 rounded-xl outline-none focus:border-brand-blue" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Telefone / WhatsApp</label>
                                    <input type="text" required value={form.telefone} onChange={e => setForm({...form, telefone: e.target.value})} className="w-full p-4 bg-gray-50 border-2 rounded-xl outline-none focus:border-brand-blue" />
                                </div>
                            </div>

                            <div className="bg-yellow-50 p-6 rounded-2xl border border-yellow-200">
                                <h3 className="font-bold text-yellow-800 mb-4"><i className="fas fa-exclamation-circle mr-2"></i>Para Menores de 18 Anos (Obrigatório)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold text-yellow-800 mb-2">Nome do Responsável</label>
                                        <input type="text" value={form.respNome} onChange={e => setForm({...form, respNome: e.target.value})} className="w-full p-4 bg-white border-2 rounded-xl outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-yellow-800 mb-2">CPF do Responsável</label>
                                        <input type="text" value={form.respDoc} onChange={e => setForm({...form, respDoc: e.target.value})} className="w-full p-4 bg-white border-2 rounded-xl outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-yellow-800 mb-2">Telefone do Responsável</label>
                                        <input type="text" value={form.respTel} onChange={e => setForm({...form, respTel: e.target.value})} className="w-full p-4 bg-white border-2 rounded-xl outline-none" />
                                    </div>
                                </div>
                            </div>

                            <button type="submit" disabled={loading} className="w-full bg-brand-yellow text-brand-blue font-black text-lg py-5 rounded-xl shadow-lg hover:bg-yellow-500 transition disabled:opacity-50">
                                {loading ? 'SALVANDO...' : 'CONCLUIR INSCRIÇÃO'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function UserDashboard({ user, setView, activities }) {
            const [tab, setTab] = useState('home');
            const [msg, setMsg] = useState({ text: '', type: '' });
            const [bookForm, setBookForm] = useState({ titulo: '', autor: '', ano: '', avaliacao: 5 });
            const [scheduleData, setScheduleData] = useState({ bookId: '', date: '', time: '' });
            const [checkinLoading, setCheckinLoading] = useState(false);
            const cardRef = useRef(null);

            const userActs = activities.filter(a => a.userId === user.dbId);
            const myBooks = userActs.filter(a => a.type === 'book');
            const activeCheckin = userActs.find(a => a.type === 'checkin' && a.status === 'active');
            
            // Calculo Dinâmico de Pontos
            const totalPoints = userActs.reduce((sum, act) => act.status === 'approved' ? sum + act.points : sum, 0);

            const showMsg = (text, type = 'success') => {
                setMsg({ text, type });
                setTimeout(() => setMsg({ text: '', type: '' }), 5000);
            };

            const handleDownloadCard = () => {
                html2canvas(cardRef.current, { scale: 2, useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Carteirinha-${user.registro}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            const calculatePoints = (minutes) => {
                if (minutes < 20) return 0;
                let pts = 0;
                let hrs = Math.floor(minutes / 60);
                let rem = minutes % 60;
                pts += hrs * 3.0; // 3 pontos por hora fechada
                if (rem >= 40) pts += 2.0;
                else if (rem >= 30) pts += 1.0;
                else if (rem >= 20) pts += 0.5;
                return pts;
            };

            const checkLocation = () => {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) return reject("Geolocalização não suportada.");
                    navigator.geolocation.getCurrentPosition(pos => {
                        const lat1 = pos.coords.latitude, lon1 = pos.coords.longitude;
                        const lat2 = -9.62, lon2 = -42.08; // Remanso Library
                        // Haversine formula (Distance calculation)
                        const R = 6371; 
                        const dLat = (lat2-lat1) * (Math.PI/180);
                        const dLon = (lon2-lon1) * (Math.PI/180);
                        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*(Math.PI/180)) * Math.cos(lat2*(Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        const distance = R * c;
                        resolve(distance <= 1); // 1km radius
                    }, err => reject("Precisamos do GPS ativado para o Check-in."), { enableHighAccuracy: true });
                });
            };

            const toggleCheckin = async () => {
                setCheckinLoading(true);
                try {
                    const isInLibrary = await checkLocation();
                    if (!isInLibrary) {
                        showMsg('Você precisa estar próximo à Biblioteca Municipal para fazer o Check-in.', 'error');
                        setCheckinLoading(false);
                        return;
                    }

                    if (activeCheckin) {
                        // Fazendo Check-out
                        const start = new Date(activeCheckin.startTime);
                        const end = new Date();
                        const diffMins = Math.floor((end - start) / 60000);
                        const earnedPts = calculatePoints(diffMins);
                        
                        await db.collection("activities").doc(activeCheckin.dbId).update({
                            status: 'approved',
                            endTime: end.toISOString(),
                            minutes: diffMins,
                            points: earnedPts
                        });
                        showMsg(`Check-out feito! Você ficou ${diffMins} min e ganhou ${earnedPts} pontos.`);
                    } else {
                        // Fazendo Check-in
                        await db.collection("activities").add({
                            userId: user.dbId,
                            type: 'checkin',
                            status: 'active',
                            startTime: new Date().toISOString(),
                            title: 'Tempo na Biblioteca'
                        });
                        showMsg('Check-in realizado com sucesso! Boa leitura.');
                    }
                } catch (e) {
                    showMsg(e.toString(), 'error');
                }
                setCheckinLoading(false);
            };

            const handleRegisterBook = async (e) => {
                e.preventDefault();
                await db.collection("activities").add({
                    userId: user.dbId,
                    type: 'book',
                    status: 'Lendo',
                    title: bookForm.titulo,
                    author: bookForm.autor,
                    year: bookForm.ano,
                    stars: bookForm.avaliacao,
                    date: new Date().toISOString(),
                    points: 0
                });
                showMsg(`Parabéns! O livro "${bookForm.titulo}" foi adicionado. Boa leitura!`);
                setBookForm({ titulo: '', autor: '', ano: '', avaliacao: 5 });
                setTab('livros');
            };

            const handleUpdateBookStatus = async (bookId, newStatus) => {
                await db.collection("activities").doc(bookId).update({ status: newStatus });
                showMsg('Status do livro atualizado!');
            };

            const handleScheduleSummary = async (e) => {
                e.preventDefault();
                if(!scheduleData.bookId || !scheduleData.date || !scheduleData.time) {
                    showMsg("Preencha todos os campos do agendamento.", "error");
                    return;
                }
                const d = new Date(scheduleData.date + 'T00:00:00');
                if(d.getDay() < 2 || d.getDay() > 4) {
                    showMsg("Agendamentos apenas de Terça a Quinta.", "error");
                    return;
                }

                await db.collection("activities").doc(scheduleData.bookId).update({
                    status: 'Agendado',
                    scheduleDate: scheduleData.date,
                    scheduleTime: scheduleData.time
                });
                showMsg("Agendamento enviado para aprovação do Administrador!");
                setScheduleData({ bookId: '', date: '', time: '' });
                setTab('home');
            };

            return (
                <div className="min-h-screen bg-gray-100 pb-20">
                    <header className="bg-brand-blue text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <i className="fas fa-book-reader text-2xl text-brand-yellow"></i>
                                <div>
                                    <h1 className="font-black text-lg">Redes Literárias</h1>
                                    <p className="text-xs text-gray-300">Área do Leitor</p>
                                </div>
                            </div>
                            <button onClick={() => setView('login')} className="text-sm font-bold text-red-300 hover:text-red-100"><i className="fas fa-sign-out-alt mr-1"></i> Sair</button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-6 px-4 space-y-6">
                        {/* ID Card Display */}
                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
                            <div ref={cardRef} className="relative p-6 bg-brand-blue text-white flex flex-col items-center">
                                <div className="absolute top-0 w-full h-24 bg-brand-yellow rounded-b-[50px] opacity-20"></div>
                                <img src={user.foto} className="w-24 h-24 rounded-full border-4 border-brand-yellow shadow-lg z-10 object-cover bg-white" />
                                <h2 className="text-2xl font-black mt-4 z-10 text-center">{user.nome}</h2>
                                <p className="text-brand-yellow font-bold z-10 mt-1"><i className="fas fa-id-badge mr-1"></i> {user.registro}</p>
                                <div className="w-full flex justify-between mt-6 bg-black bg-opacity-20 p-4 rounded-xl z-10 backdrop-blur-sm">
                                    <div className="text-center"><p className="text-xs text-gray-300 uppercase">Pontuação</p><p className="text-xl font-black text-brand-yellow">{totalPoints}</p></div>
                                    <div className="text-center"><p className="text-xs text-gray-300 uppercase">Livros Lidos</p><p className="text-xl font-black text-brand-yellow">{myBooks.filter(b=>b.status !== 'Lendo').length}</p></div>
                                </div>
                            </div>
                            <button onClick={handleDownloadCard} className="w-full py-4 text-brand-blue font-black hover:bg-gray-50 flex items-center justify-center transition"><i className="fas fa-download mr-2"></i> Baixar Carteirinha Oficial</button>
                        </div>

                        {/* Navigation Tabs */}
                        <div className="flex bg-white rounded-2xl shadow-sm p-2 overflow-x-auto hide-scroll gap-2">
                            <button onClick={() => setTab('home')} className={`flex-1 min-w-[120px] py-3 px-4 rounded-xl font-bold text-sm transition ${tab === 'home' ? 'bg-brand-blue text-white' : 'bg-gray-50 text-gray-600'}`}><i className="fas fa-home block mb-1"></i> Resumo</button>
                            <button onClick={() => setTab('checkin')} className={`flex-1 min-w-[120px] py-3 px-4 rounded-xl font-bold text-sm transition ${tab === 'checkin' ? 'bg-brand-yellow text-brand-blue' : 'bg-gray-50 text-gray-600'}`}><i className="fas fa-map-marker-alt block mb-1"></i> Check-in</button>
                            <button onClick={() => setTab('livros')} className={`flex-1 min-w-[120px] py-3 px-4 rounded-xl font-bold text-sm transition ${tab === 'livros' ? 'bg-brand-blue text-white' : 'bg-gray-50 text-gray-600'}`}><i className="fas fa-book block mb-1"></i> Meus Livros</button>
                            <button onClick={() => setTab('agendar')} className={`flex-1 min-w-[120px] py-3 px-4 rounded-xl font-bold text-sm transition ${tab === 'agendar' ? 'bg-orange-500 text-white' : 'bg-gray-50 text-gray-600'}`}><i className="fas fa-calendar-check block mb-1"></i> Entregar Resumo</button>
                        </div>

                        {msg.text && <div className={`p-4 rounded-xl font-bold text-sm text-center shadow-sm ${msg.type === 'error' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>{msg.text}</div>}

                        {/* Content Rendering based on Tab */}
                        {tab === 'home' && (
                            <div className="bg-white rounded-3xl shadow-sm p-6">
                                <h3 className="font-black text-xl text-brand-blue border-b-2 pb-2 mb-4">Últimas Atividades</h3>
                                <div className="space-y-4">
                                    {userActs.length === 0 ? <p className="text-gray-500 text-center py-6 font-medium">Você ainda não tem atividades registradas.</p> : 
                                     userActs.sort((a,b) => new Date(b.date || b.startTime) - new Date(a.date || a.startTime)).map(act => (
                                        <div key={act.dbId} className="flex justify-between items-center p-4 border rounded-xl bg-gray-50">
                                            <div>
                                                <p className="font-bold text-gray-800">{act.title}</p>
                                                <p className="text-xs font-bold text-gray-500 uppercase mt-1">
                                                    {act.type === 'book' ? `Livro - Status: ${act.status}` : 
                                                     act.type === 'checkin' ? `Presença (${act.minutes || 0} min)` : 
                                                     act.type === 'event' ? 'Participação em Evento' : act.type}
                                                </p>
                                            </div>
                                            <div className={`font-black text-sm px-3 py-1 rounded-full ${act.status === 'approved' || act.status === 'Resumo Aprovado' ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>
                                                {act.points > 0 ? `+${act.points} pts` : act.status}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'checkin' && (
                            <div className="bg-white rounded-3xl shadow-sm p-6 text-center">
                                <h3 className="font-black text-xl text-brand-blue mb-2">Check-in de Leitura</h3>
                                <p className="text-sm text-gray-600 mb-6 font-medium">Ganhe pontos lendo presencialmente na Biblioteca. É necessário permitir o uso do GPS.</p>
                                
                                <div className="bg-blue-50 text-brand-blue p-4 rounded-xl font-bold text-sm mb-8 flex justify-center gap-4">
                                    <div>20m = 0.5pt</div><div>30m = 1pt</div><div>40m = 2pt</div><div>1h = 3pt</div>
                                </div>

                                {activeCheckin ? (
                                    <button onClick={toggleCheckin} disabled={checkinLoading} className="w-full max-w-sm mx-auto bg-red-500 text-white font-black text-lg py-16 rounded-full shadow-xl hover:bg-red-600 transition flex flex-col items-center justify-center border-8 border-red-200">
                                        <i className="fas fa-sign-out-alt text-4xl mb-2"></i> FAZER CHECK-OUT
                                    </button>
                                ) : (
                                    <button onClick={toggleCheckin} disabled={checkinLoading} className="w-full max-w-sm mx-auto bg-green-500 text-white font-black text-lg py-16 rounded-full shadow-xl hover:bg-green-600 transition flex flex-col items-center justify-center border-8 border-green-200">
                                        <i className="fas fa-map-marker-alt text-4xl mb-2"></i> FAZER CHECK-IN
                                    </button>
                                )}
                            </div>
                        )}

                        {tab === 'livros' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-3xl shadow-sm p-6 border-l-4 border-brand-yellow">
                                    <h3 className="font-black text-xl text-brand-blue mb-4">Adicionar Nova Leitura</h3>
                                    <form onSubmit={handleRegisterBook} className="space-y-4">
                                        <input type="text" required value={bookForm.titulo} onChange={e=>setBookForm({...bookForm, titulo: e.target.value})} placeholder="Nome do Livro" className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="text" required value={bookForm.autor} onChange={e=>setBookForm({...bookForm, autor: e.target.value})} placeholder="Autor" className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold" />
                                            <input type="number" required value={bookForm.ano} onChange={e=>setBookForm({...bookForm, ano: e.target.value})} placeholder="Ano de Publicação" className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Sua Avaliação (Estrelas)</label>
                                            <select value={bookForm.avaliacao} onChange={e=>setBookForm({...bookForm, avaliacao: Number(e.target.value)})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold">
                                                <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
                                                <option value="4">⭐⭐⭐⭐ (Muito Bom)</option>
                                                <option value="3">⭐⭐⭐ (Bom)</option>
                                                <option value="2">⭐⭐ (Razoável)</option>
                                                <option value="1">⭐ (Ruim)</option>
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full bg-brand-blue text-white font-black py-4 rounded-xl hover:bg-opacity-90 transition shadow-md">Salvar Livro</button>
                                    </form>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm p-6">
                                    <h3 className="font-black text-xl text-brand-blue mb-4">Minhas Leituras</h3>
                                    <div className="space-y-4">
                                        {myBooks.length === 0 ? <p className="text-gray-500 font-medium">Nenhum livro cadastrado.</p> : 
                                         myBooks.map(book => (
                                            <div key={book.dbId} className="p-4 border-2 rounded-xl">
                                                <h4 className="font-black text-lg text-gray-800">{book.title}</h4>
                                                <p className="text-sm font-bold text-gray-500 mb-3">{book.author} | {book.year} | {'⭐'.repeat(book.stars)}</p>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black bg-gray-200 px-3 py-1 rounded-full uppercase">{book.status}</span>
                                                    {book.status === 'Lendo' && (
                                                        <button onClick={() => handleUpdateBookStatus(book.dbId, 'Lido')} className="text-xs font-black bg-green-500 text-white px-3 py-1 rounded-full hover:bg-green-600 transition shadow-sm">Marcar como Lido</button>
                                                    )}
                                                </div>
                                            </div>
                                         ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'agendar' && (
                            <div className="bg-white rounded-3xl shadow-sm p-6 border-l-4 border-orange-500">
                                <h3 className="font-black text-xl text-brand-blue mb-4">Agendar Entrega de Resumo</h3>
                                <div className="bg-orange-50 text-orange-800 p-4 rounded-xl font-bold text-sm mb-6 shadow-sm border border-orange-200">
                                    <i className="fas fa-exclamation-triangle mr-2"></i> AVISO OFICIAL:<br/><br/>
                                    O resumo é escrito presencialmente na Biblioteca Municipal, sem consulta. Só queremos saber o que você entendeu!<br/>
                                    <strong>Dias:</strong> Terça a Quinta.<br/>
                                    <strong>Horários:</strong> 09h às 17:30h.<br/>
                                    <strong>Vale MUITO ponto!</strong>
                                </div>

                                {myBooks.filter(b => b.status === 'Lido').length === 0 ? (
                                    <p className="text-center font-bold text-gray-500 p-6 bg-gray-50 rounded-xl border-2 border-dashed">Você não tem livros com status "Lido" para agendar resumo.</p>
                                ) : (
                                    <form onSubmit={handleScheduleSummary} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Qual livro vai resumir?</label>
                                            <select required value={scheduleData.bookId} onChange={e=>setScheduleData({...scheduleData, bookId: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold outline-none">
                                                <option value="">Selecione o Livro...</option>
                                                {myBooks.filter(b => b.status === 'Lido').map(b => <option key={b.dbId} value={b.dbId}>{b.title}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">Data da Ida</label>
                                                <input type="date" required value={scheduleData.date} onChange={e=>setScheduleData({...scheduleData, date: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-2">Horário (09:00 - 17:30)</label>
                                                <input type="time" min="09:00" max="17:30" required value={scheduleData.time} onChange={e=>setScheduleData({...scheduleData, time: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold outline-none" />
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-orange-500 text-white font-black py-4 rounded-xl hover:bg-orange-600 transition shadow-md text-lg">ENVIAR PEDIDO DE AGENDAMENTO</button>
                                    </form>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function AdminDashboard({ setView, users, activities }) {
            const [tab, setTab] = useState('resumos');
            const [msg, setMsg] = useState({text:'', type:''});
            const [eventData, setEventData] = useState({ cpf: '', nomeEvento: '' });

            const showMsg = (text, type = 'success') => {
                setMsg({ text, type });
                setTimeout(() => setMsg({ text: '', type: '' }), 4000);
            };

            const ranking = users.map(u => {
                const acts = activities.filter(a => a.userId === u.dbId && a.status === 'approved' || a.status === 'Resumo Aprovado');
                const pts = acts.reduce((sum, a) => sum + (a.points || 0), 0);
                const infractions = acts.filter(a=> a.type === 'infraction').reduce((sum, a) => sum + (a.points || 0), 0);
                return { ...u, points: pts - infractions };
            }).sort((a,b) => b.points - a.points);

            const handleApproveSummary = async (bookId) => {
                await db.collection("activities").doc(bookId).update({ status: 'Resumo Aprovado', points: 50 });
                showMsg('Resumo Aprovado! 50 pontos adicionados ao leitor.');
            };

            const handleRegisterEvent = async (e) => {
                e.preventDefault();
                const user = users.find(u => u.registro === eventData.cpf || u.documento === eventData.cpf);
                if (!user) { showMsg('Leitor não encontrado.', 'error'); return; }
                await db.collection("activities").add({ userId: user.dbId, type: 'event', status: 'approved', title: `Evento: ${eventData.nomeEvento}`, points: 30, date: new Date().toISOString() });
                showMsg(`30 pontos adicionados para ${user.nome}!`);
                setEventData({cpf:'', nomeEvento:''});
            };

            const handleDeleteUser = async (userId) => {
                if(confirm("Tem certeza que deseja apagar este leitor e todas as atividades dele?")) {
                    await db.collection("users").doc(userId).delete();
                    showMsg("Leitor excluído por segurança antifraude.");
                }
            };

            const handleExportExcel = () => {
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ranking.map(u => ({ Nome: u.nome, Registro: u.registro, Idade: u.idade, Contato: u.telefone, Pontos: u.points }))), "Leitores");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(activities.filter(a=>a.type==='book').map(b => ({ Livro: b.title, Autor: b.author, Status: b.status }))), "Livros");
                XLSX.writeFile(wb, "Relatorio_Biblioteca.xlsx");
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <header className="bg-gray-900 text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div><h1 className="font-black text-xl">Painel Admin</h1><p className="text-xs text-gray-400">Biblioteca Délio Ledoux</p></div>
                            <button onClick={() => setView('login')} className="text-sm font-bold bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition">Sair</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4">
                        <div className="flex flex-wrap bg-white rounded-xl shadow-sm mb-6 overflow-hidden border">
                            <button onClick={()=>setTab('resumos')} className={`flex-1 min-w-[120px] py-3 px-2 font-bold text-sm ${tab==='resumos' ? 'bg-brand-blue text-white':'text-gray-600'}`}>Resumos Pendentes</button>
                            <button onClick={()=>setTab('status')} className={`flex-1 min-w-[120px] py-3 px-2 font-bold text-sm ${tab==='status' ? 'bg-brand-blue text-white':'text-gray-600'}`}>Status Leituras</button>
                            <button onClick={()=>setTab('eventos')} className={`flex-1 min-w-[120px] py-3 px-2 font-bold text-sm ${tab==='eventos' ? 'bg-brand-blue text-white':'text-gray-600'}`}>Eventos</button>
                            <button onClick={()=>setTab('leitores')} className={`flex-1 min-w-[120px] py-3 px-2 font-bold text-sm ${tab==='leitores' ? 'bg-brand-blue text-white':'text-gray-600'}`}>Leitores (Antifraude)</button>
                            <button onClick={()=>setTab('ranking')} className={`flex-1 min-w-[120px] py-3 px-2 font-bold text-sm ${tab==='ranking' ? 'bg-brand-blue text-white':'text-gray-600'}`}>Ranking</button>
                        </div>

                        {msg.text && <div className={`p-4 rounded-xl font-bold mb-6 text-center shadow-sm ${msg.type === 'error' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>{msg.text}</div>}

                        <div className="bg-white rounded-3xl shadow-sm p-6 border">
                            {tab === 'resumos' && (
                                <div>
                                    <h2 className="text-2xl font-black text-brand-blue mb-6">Aprovar Resumos</h2>
                                    {activities.filter(a => a.status === 'Agendado').length === 0 ? <p className="text-gray-500 font-bold">Nenhum agendamento pendente.</p> :
                                     activities.filter(a => a.status === 'Agendado').map(act => {
                                        const u = users.find(usr => usr.dbId === act.userId);
                                        return (
                                            <div key={act.dbId} className="flex justify-between items-center p-4 border-2 rounded-xl mb-4 bg-orange-50">
                                                <div>
                                                    <p className="font-black text-lg">{u?.nome} <span className="text-sm text-gray-500 font-bold">({u?.registro})</span></p>
                                                    <p className="font-bold text-gray-700">Livro: {act.title}</p>
                                                    <p className="text-sm font-black text-orange-600 mt-2 bg-orange-200 inline-block px-3 py-1 rounded-full"><i className="fas fa-calendar-alt mr-1"></i> Marcado para: {act.scheduleDate} às {act.scheduleTime}</p>
                                                </div>
                                                <button onClick={() => handleApproveSummary(act.dbId)} className="bg-green-600 text-white font-black py-3 px-6 rounded-xl hover:bg-green-700 shadow-md">APROVAR (+50 pts)</button>
                                            </div>
                                        )
                                     })}
                                </div>
                            )}

                            {tab === 'status' && (
                                <div>
                                    <h2 className="text-2xl font-black text-brand-blue mb-6">Gestão Completa de Leituras</h2>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-100">
                                                    <th className="p-4 font-black text-gray-600">Leitor</th>
                                                    <th className="p-4 font-black text-gray-600">Livro</th>
                                                    <th className="p-4 font-black text-gray-600">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {activities.filter(a => a.type === 'book').map(book => {
                                                    const u = users.find(usr => usr.dbId === book.userId);
                                                    return (
                                                        <tr key={book.dbId} className="border-b">
                                                            <td className="p-4 font-bold text-gray-800">{u?.nome} <br/><span className="text-xs text-gray-500">{u?.registro}</span></td>
                                                            <td className="p-4 font-bold">{book.title}</td>
                                                            <td className="p-4 font-black"><span className="bg-gray-200 px-3 py-1 rounded-full text-sm uppercase">{book.status}</span></td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {tab === 'eventos' && (
                                <div className="max-w-md">
                                    <h2 className="text-2xl font-black text-brand-blue mb-6">Registrar Evento</h2>
                                    <form onSubmit={handleRegisterEvent} className="space-y-4">
                                        <input type="text" placeholder="CPF ou Registro do Leitor" required value={eventData.cpf} onChange={e=>setEventData({...eventData, cpf: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold outline-none" />
                                        <input type="text" placeholder="Nome do Evento" required value={eventData.nomeEvento} onChange={e=>setEventData({...eventData, nomeEvento: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 font-bold outline-none" />
                                        <button type="submit" className="w-full bg-brand-blue text-white font-black py-4 rounded-xl shadow-md hover:bg-opacity-90">Dar 30 Pontos</button>
                                    </form>
                                </div>
                            )}

                            {tab === 'leitores' && (
                                <div>
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-black text-brand-blue">Controle de Leitores</h2>
                                        <button onClick={handleExportExcel} className="bg-green-600 text-white font-black px-6 py-3 rounded-xl shadow-md hover:bg-green-700"><i className="fas fa-file-excel mr-2"></i> Exportar Tudo (Excel)</button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-100">
                                                    <th className="p-4 font-black text-gray-600">Foto</th>
                                                    <th className="p-4 font-black text-gray-600">Leitor / Contato</th>
                                                    <th className="p-4 font-black text-gray-600">Responsável</th>
                                                    <th className="p-4 font-black text-gray-600">Ações</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {users.map(u => (
                                                    <tr key={u.dbId} className="border-b">
                                                        <td className="p-4"><img src={u.foto} className="w-12 h-12 rounded-full object-cover border-2 border-brand-blue"/></td>
                                                        <td className="p-4"><p className="font-bold">{u.nome}</p><p className="text-xs text-gray-500 font-bold">{u.registro} | {u.telefone}</p></td>
                                                        <td className="p-4 text-xs font-bold text-gray-500">{u.respNome ? `${u.respNome} (${u.respTel})` : 'Maior de Idade'}</td>
                                                        <td className="p-4">
                                                            <button onClick={() => handleDeleteUser(u.dbId)} className="bg-red-100 text-red-600 font-black px-3 py-2 rounded-lg hover:bg-red-200 text-xs"><i className="fas fa-trash-alt mr-1"></i> Excluir (Fraude)</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {tab === 'ranking' && (
                                <div>
                                    <h2 className="text-2xl font-black text-brand-blue mb-6">Ranking Geral Oficial</h2>
                                    <div className="space-y-3">
                                        {ranking.map((u, i) => (
                                            <div key={u.dbId} className="flex justify-between items-center p-4 border-2 rounded-xl bg-gray-50">
                                                <div className="flex items-center gap-4">
                                                    <span className={`text-2xl font-black ${i===0?'text-yellow-500':i===1?'text-gray-400':i===2?'text-orange-500':'text-gray-700'}`}>{i+1}º</span>
                                                    <img src={u.foto} className="w-12 h-12 rounded-full object-cover border-2 border-brand-yellow"/>
                                                    <div><p className="font-bold text-gray-800">{u.nome}</p><p className="text-xs text-gray-500 font-bold">{u.registro}</p></div>
                                                </div>
                                                <div className="font-black text-xl text-brand-blue">{u.points} pts</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
