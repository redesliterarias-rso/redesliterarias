<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Redes Literárias</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React, ReactDOM e Babel (para rodar direto no navegador) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Biblioteca SheetJS para Exportação Profissional em Excel (.xlsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* Estilos customizados para barra de rolagem e modais */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-overlay { background-color: rgba(0, 59, 73, 0.7); backdrop-filter: blur(4px); }
        
        /* Fundo Tecnológico com Rede de Pesca e Nós */
        .tech-net-bg {
            background-color: #f8b417;
            background-image: 
                radial-gradient(circle at center, #003b49 2px, transparent 2px),
                linear-gradient(45deg, transparent 49%, rgba(0, 59, 73, 0.15) 49%, rgba(0, 59, 73, 0.15) 51%, transparent 51%),
                linear-gradient(-45deg, transparent 49%, rgba(0, 59, 73, 0.15) 49%, rgba(0, 59, 73, 0.15) 51%, transparent 51%);
            background-size: 40px 40px, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 0;
        }

        /* Animação de Celebração */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased selection:bg-yellow-300 selection:text-blue-900">
    <div id="root">
        <div class="min-h-screen flex flex-col items-center justify-center text-[#003b49] tech-net-bg">
            <i class="fas fa-circle-notch fa-spin fa-4x mb-4 bg-white rounded-full p-2 shadow-lg"></i>
            <h2 class="text-2xl font-black bg-white px-4 py-2 rounded-xl shadow-md mt-2">Iniciando Plataforma...</h2>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FUNÇÕES AUXILIARES ---
        
        function calculateUserPoints(userId, activities) {
            let pts = activities.filter(a => a.userId === userId).reduce((sum, act) => {
                if (act.status === 'summary_approved' || act.type === 'checkin' || act.type === 'event' || act.type === 'book' && act.status !== 'penalty') {
                    return sum + (act.points || 0);
                }
                if (act.type === 'penalty') {
                    return sum - (act.pointsDeducted || 0);
                }
                return sum;
            }, 0);
            return Math.round(pts * 10) / 10; // Arredonda para 1 casa decimal para evitar bugs do JS
        }

        // Lógica de Pontuação por Minutos
        function calcVisitPoints(minutes) {
            if (minutes < 20) return 0;
            if (minutes < 30) return 0.5;
            if (minutes < 40) return 1.0;
            if (minutes < 60) return 2.0;
            
            // A partir de 1h (60 min) = 3 pontos. Cada 20 min extras = +1 ponto.
            let pts = 3.0;
            let extraMins = minutes - 60;
            pts += Math.floor(extraMins / 20) * 1.0;
            return pts;
        }

        // Exportação Completa em Múltiplas Abas (Planilha Excel Real)
        function exportToExcel(users, activities, ranking) {
            const wb = XLSX.utils.book_new();

            // Aba 1: Leitores
            const leitoresData = users.map(u => ({
                'Nº Registro': u.registro, 'Nome Completo': u.nome, 'CPF': u.documento, 'Idade': u.idade, 'WhatsApp': u.telefone, 'Endereço': u.endereco, 
                'Nome Responsável': u.nomeResponsavel || 'N/A', 'Vínculo': u.vinculoResponsavel || 'N/A', 'Contato Resp.': u.telefoneResponsavel || 'N/A',
                'Data Inscrição': new Date(u.dataCadastro).toLocaleDateString()
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(leitoresData), "Leitores");

            // Aba 2: Livros e Resumos
            const livrosData = activities.filter(a => a.type === 'book').map(b => {
                const u = users.find(user => user.id === b.userId);
                return {
                    'Leitor': u ? u.nome : 'Desconhecido', 'Registro': u ? u.registro : '',
                    'Título da Obra': b.title, 'Autor': b.author, 'Ano': b.year, 
                    'Status Atual': b.status === 'summary_approved' ? 'Resumo Aprovado' : b.status === 'schedule_approved' ? 'Agendado' : b.status === 'schedule_pending' ? 'Aguardando Agendamento' : b.status === 'read' ? 'Lido' : 'Lendo',
                    'Avaliação (Estrelas)': b.rating ? `${b.rating}/5` : 'Não Avaliado',
                    'Pontos Ganhos': b.points || 0
                };
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(livrosData), "Livros e Resumos");

            // Aba 3: Eventos
            const eventosData = activities.filter(a => a.type === 'event' && a.status === 'completed').map(e => {
                const u = users.find(user => user.id === e.userId);
                return {
                    'Leitor': u ? u.nome : 'Desconhecido', 'Registro': u ? u.registro : '',
                    'Nome do Evento': e.title, 'Data da Participação': new Date(e.checkInTime).toLocaleDateString(),
                    'Pontos Ganhos': e.points
                };
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(eventosData), "Eventos");

            // Aba 4: Infrações
            const infracoesData = activities.filter(a => a.type === 'penalty').map(p => {
                const u = users.find(user => user.id === p.userId);
                return {
                    'Leitor': u ? u.nome : 'Desconhecido', 'Registro': u ? u.registro : '',
                    'Motivo da Infração': p.title.replace('Infração: ', ''), 'Data': new Date(p.date).toLocaleDateString(),
                    'Pontos Descontados': p.pointsDeducted
                };
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(infracoesData), "Infrações");

            // Aba 5: Ranking Geral
            const rankingData = ranking.map((r, index) => ({
                'Posição': `${index + 1}º`, 'Nome do Leitor': r.nome, 'Registro': r.registro, 'Pontuação Final': r.points
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rankingData), "Ranking Geral");

            // Baixar o arquivo Excel
            XLSX.writeFile(wb, "Banco_de_Dados_RedesLiterarias.xlsx");
        }

        function App() {
            const [currentView, setCurrentView] = useState('login'); 
            const [currentUser, setCurrentUser] = useState(null);
            
            // Banco de Dados Local (localStorage) à prova de falhas
            const [users, setUsers] = useState(() => {
                try { const saved = localStorage.getItem('redes_users_v5'); return saved ? JSON.parse(saved) : []; } 
                catch (e) { return []; }
            });
            
            const [activities, setActivities] = useState(() => {
                try { const saved = localStorage.getItem('redes_activities_v5'); return saved ? JSON.parse(saved) : []; } 
                catch (e) { return []; }
            });

            useEffect(() => { localStorage.setItem('redes_users_v5', JSON.stringify(users)); }, [users]);
            useEffect(() => { localStorage.setItem('redes_activities_v5', JSON.stringify(activities)); }, [activities]);

            const handleLogin = (userType, user) => {
                setCurrentUser(user);
                setCurrentView(userType);
            };

            if (currentView === 'login') return <LoginScreen onLogin={handleLogin} onRegister={() => setCurrentView('register')} users={users} />;
            if (currentView === 'register') return <RegisterScreen onCancel={() => setCurrentView('login')} onSuccess={(newUser) => { setUsers([...users, newUser]); handleLogin('user', newUser); }} users={users} />;
            if (currentView === 'user') return <UserDashboard user={currentUser} onLogout={() => {setCurrentUser(null); setCurrentView('login');}} activities={activities} setActivities={setActivities} />;
            if (currentView === 'admin') return <AdminDashboard onLogout={() => {setCurrentUser(null); setCurrentView('login');}} users={users} setUsers={setUsers} activities={activities} setActivities={setActivities} />;
            
            return <div>Erro Crítico.</div>;
        }

        function LoginScreen({ onLogin, onRegister, users }) {
            const [mode, setMode] = useState('user'); 
            const [identifier, setIdentifier] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleUserLogin = (e) => {
                e.preventDefault();
                const user = users.find(u => u.registro === identifier || u.documento === identifier);
                if (user) onLogin('user', user);
                else setError('Leitor não encontrado. Verifique o registro/CPF ou cadastre-se.');
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (email === 'bibliotecaderemanso@gmail.com' && password === 'Rso.redes.2026#') {
                    onLogin('admin', { role: 'admin', name: 'Administração' });
                } else setError('Credenciais inválidas.');
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative tech-net-bg">
                    <div className="absolute inset-0 bg-white bg-opacity-20 pointer-events-none"></div>
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative z-10 border border-yellow-400">
                        <div className="p-8 bg-[#003b49] text-white flex flex-col items-center relative">
                            <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-4 shadow-xl p-1 relative z-10 border-4 border-[#f8b417]">
                                <img src="Redes%20liter%C3%A1rias_Biblioteca%20(1).png" alt="Logo" className="w-full h-full object-contain rounded-full" onError={(e)=>{e.target.style.display='none'}} />
                            </div>
                            <h1 className="text-3xl font-black text-center tracking-tight text-[#f8b417]">Redes Literárias</h1>
                            <p className="text-sm text-blue-100 mt-2 font-medium tracking-wide uppercase">Biblioteca de Remanso</p>
                        </div>
                        
                        <div className="flex border-b border-gray-200">
                            <button className={`flex-1 py-4 font-black transition-colors ${mode === 'user' ? 'text-[#003b49] border-b-4 border-[#003b49] bg-gray-50' : 'text-gray-400'}`} onClick={() => { setMode('user'); setError(''); }}><i className="fas fa-user-graduate mr-2"></i> Sou Leitor</button>
                            <button className={`flex-1 py-4 font-black transition-colors ${mode === 'admin' ? 'text-[#003b49] border-b-4 border-[#003b49] bg-gray-50' : 'text-gray-400'}`} onClick={() => { setMode('admin'); setError(''); }}><i className="fas fa-shield-alt mr-2"></i> Admin</button>
                        </div>

                        <div className="p-8">
                            {error && <div className="mb-6 p-4 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-inner border border-red-200"><i className="fas fa-exclamation-triangle mr-3"></i>{error}</div>}
                            
                            {mode === 'user' ? (
                                <form onSubmit={handleUserLogin} className="space-y-5">
                                    <div><label className="block text-sm font-bold text-gray-700 mb-2">Registro ou CPF</label><input type="text" value={identifier} onChange={(e) => setIdentifier(e.target.value)} className="w-full p-4 border rounded-xl focus:ring-4 focus:ring-yellow-200 outline-none" required /></div>
                                    <button type="submit" className="w-full bg-[#003b49] text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-gray-800 transition">Entrar no Painel</button>
                                    <div className="text-center pt-6 mt-4 border-t">
                                        {new Date() > new Date('2026-07-17T17:00:00-03:00') ? (
                                            <div className="p-4 bg-red-50 text-red-700 rounded-xl font-bold shadow-inner border border-red-200">
                                                <i className="fas fa-lock mr-2"></i> Inscrições encerradas (17/07/2026 às 17h)
                                            </div>
                                        ) : (
                                            <button type="button" onClick={onRegister} className="w-full bg-[#f8b417] text-[#003b49] py-4 rounded-xl font-black hover:bg-yellow-400 shadow-md">Fazer Inscrição Agora</button>
                                        )}
                                    </div>
                                </form>
                            ) : (
                                <form onSubmit={handleAdminLogin} className="space-y-5">
                                    <div><label className="block text-sm font-bold text-gray-700 mb-2">E-mail Institucional</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-4 border rounded-xl focus:ring-4 focus:ring-blue-100 outline-none" required /></div>
                                    <div><label className="block text-sm font-bold text-gray-700 mb-2">Senha</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-4 border rounded-xl focus:ring-4 focus:ring-blue-100 outline-none" required /></div>
                                    <button type="submit" className="w-full bg-gray-900 text-white py-4 rounded-xl font-black text-lg shadow-lg mt-2">Acessar Sistema</button>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function RegisterScreen({ onCancel, onSuccess, users }) {
            const isRegistrationClosed = new Date() > new Date('2026-07-17T17:00:00-03:00');

            if (isRegistrationClosed) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full text-center border-4 border-red-500">
                            <i className="fas fa-lock fa-4x text-red-500 mb-6"></i>
                            <h2 className="text-3xl font-black text-gray-800 mb-4">Inscrições Encerradas</h2>
                            <p className="text-gray-600 font-bold mb-8">O prazo oficial para novas inscrições encerrou no dia 17/07/2026 às 17h00.</p>
                            <button onClick={onCancel} className="w-full bg-[#003b49] text-white px-6 py-4 rounded-xl font-black hover:bg-gray-800 transition shadow-lg">Voltar ao Início</button>
                        </div>
                    </div>
                );
            }

            const [formData, setFormData] = useState({ nome: '', documento: '', nascimento: '', endereco: '', telefone: '', nomeResponsavel: '', docResponsavel: '', telefoneResponsavel: '', vinculoResponsavel: '' });
            const [selfieUrl, setSelfieUrl] = useState(null);
            const [age, setAge] = useState(null);
            const [error, setError] = useState('');
            const [cameraActive, setCameraActive] = useState(false);
            
            const videoRef = useRef(null);
            const streamRef = useRef(null);

            const calculateAge = (dobString) => {
                if (!dobString) return null;
                const dob = new Date(dobString); const today = new Date();
                let calcAge = today.getFullYear() - dob.getFullYear();
                const m = today.getMonth() - dob.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) calcAge--;
                return calcAge;
            };

            const handleDateChange = (e) => {
                const newDate = e.target.value; setFormData({ ...formData, nascimento: newDate });
                const calcAge = calculateAge(newDate); setAge(calcAge);
                if (calcAge !== null && calcAge < 11) setError('É necessário ter pelo menos 11 anos para participar.');
                else setError('');
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) { setError('Imagem muito grande (Máx 2MB).'); return; }
                    const reader = new FileReader();
                    reader.onloadend = () => setSelfieUrl(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const startCamera = async () => {
                try {
                    setError('');
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    streamRef.current = stream;
                    setCameraActive(true);
                    setTimeout(() => {
                        if(videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
                    }, 200);
                } catch (err) {
                    setError("Erro ao acessar câmera. O navegador pode estar bloqueando. Use 'Anexar Arquivo'.");
                }
            };

            const takePhoto = () => {
                if(videoRef.current) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                    setSelfieUrl(canvas.toDataURL('image/jpeg', 0.8));
                    stopCamera();
                }
            };

            const stopCamera = () => {
                if(streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
                setCameraActive(false);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (age < 11) { setError('Idade mínima não atingida.'); return; }
                if (!selfieUrl) { setError('Adicione uma foto de perfil.'); return; }
                
                // Trava Antifraude (Nome ou CPF únicos)
                const leitorExiste = users.some(u => u.documento === formData.documento || u.nome.trim().toLowerCase() === formData.nome.trim().toLowerCase());
                if (leitorExiste) { setError('Atenção: Já existe um leitor cadastrado com este Nome ou Documento (CPF).'); window.scrollTo(0,0); return; }
                
                if (age < 18 && (!formData.nomeResponsavel || !formData.docResponsavel || !formData.vinculoResponsavel)) {
                    setError('Dados do responsável são obrigatórios para menores de idade.'); return;
                }

                const registro = Math.floor(100000 + Math.random() * 900000).toString();
                const newUser = { ...formData, id: Date.now().toString(), registro: `RSO-${registro}`, foto: selfieUrl, idade: age, dataCadastro: new Date().toISOString() };
                onSuccess(newUser);
            };

            return (
                <div className="min-h-screen bg-gray-50 py-8 px-4">
                    <div className="max-w-3xl mx-auto bg-white rounded-[2rem] shadow-xl p-6 md:p-10">
                        <button onClick={onCancel} className="text-[#003b49] mb-6 flex items-center font-bold hover:underline bg-blue-50 px-4 py-2 rounded-xl transition"><i className="fas fa-arrow-left mr-2"></i> Voltar</button>
                        <h2 className="text-3xl font-black text-[#003b49] mb-6 border-b pb-4">Nova Inscrição</h2>
                        {error && <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 font-bold shadow-sm">{error}</div>}

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="p-6 border-2 border-dashed border-gray-300 rounded-3xl bg-gray-50 text-center">
                                {cameraActive ? (
                                    <div className="flex flex-col items-center">
                                        <video ref={videoRef} className="w-full max-w-sm rounded-2xl border-4 border-[#f8b417] shadow-lg mb-4 bg-black" playsInline></video>
                                        <div className="flex gap-4">
                                             <button type="button" onClick={takePhoto} className="bg-green-500 text-white px-6 py-2 rounded-xl font-bold shadow-md"><i className="fas fa-camera mr-2"></i>Capturar</button>
                                             <button type="button" onClick={stopCamera} className="bg-red-500 text-white px-6 py-2 rounded-xl font-bold shadow-md"><i className="fas fa-times mr-2"></i>Cancelar</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center">
                                        {selfieUrl ? <img src={selfieUrl} className="w-32 h-32 rounded-full object-cover border-4 border-[#f8b417] shadow-xl mb-4" /> : <div className="w-32 h-32 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 shadow-inner mb-4"><i className="fas fa-user-circle fa-4x"></i></div>}
                                        <div className="flex flex-wrap justify-center gap-3 mt-2">
                                            <button type="button" onClick={startCamera} className="bg-[#003b49] text-white px-5 py-2.5 rounded-xl font-bold hover:bg-opacity-90 shadow-md flex items-center"><i className="fas fa-camera mr-2"></i> Tirar Foto</button>
                                            <label className="cursor-pointer bg-gray-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-opacity-90 shadow-md flex items-center"><i className="fas fa-upload mr-2"></i> Anexar Arquivo
                                                <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                            </label>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-3 font-bold">Esta foto irá para a sua carteirinha oficial.</p>
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div className="md:col-span-2"><label className="block text-sm font-black mb-2">Nome Completo</label><input required type="text" value={formData.nome} onChange={e => setFormData({...formData, nome: e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                <div><label className="block text-sm font-black mb-2">Data Nascimento</label><input required type="date" value={formData.nascimento} onChange={handleDateChange} className="w-full p-3 border rounded-xl" /></div>
                                <div><label className="block text-sm font-black mb-2">RG ou CPF</label><input required type="text" value={formData.documento} onChange={e => setFormData({...formData, documento: e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-black mb-2">Endereço</label><input required type="text" value={formData.endereco} onChange={e => setFormData({...formData, endereco: e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-black mb-2">WhatsApp</label><input required type="text" value={formData.telefone} onChange={e => setFormData({...formData, telefone: e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                            </div>

                            {age !== null && age >= 11 && age < 18 && (
                                <div className="p-6 bg-yellow-50 border-2 border-yellow-300 rounded-3xl mt-6">
                                    <h3 className="font-black text-yellow-900 mb-4 flex items-center"><i className="fas fa-shield-alt mr-2"></i> Dados do Responsável (Obrigatório)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="md:col-span-2"><label className="block text-xs font-bold mb-1">Nome do Responsável</label><input required type="text" value={formData.nomeResponsavel} onChange={e => setFormData({...formData, nomeResponsavel: e.target.value})} className="w-full p-3 border border-yellow-400 rounded-xl" /></div>
                                        <div><label className="block text-xs font-bold mb-1">CPF Responsável</label><input required type="text" value={formData.docResponsavel} onChange={e => setFormData({...formData, docResponsavel: e.target.value})} className="w-full p-3 border border-yellow-400 rounded-xl" /></div>
                                        <div><label className="block text-xs font-bold mb-1">Vínculo (Pai, Mãe, etc)</label><input required type="text" value={formData.vinculoResponsavel} onChange={e => setFormData({...formData, vinculoResponsavel: e.target.value})} className="w-full p-3 border border-yellow-400 rounded-xl" /></div>
                                        <div className="md:col-span-2"><label className="block text-xs font-bold mb-1">Telefone Responsável</label><input required type="text" value={formData.telefoneResponsavel} onChange={e => setFormData({...formData, telefoneResponsavel: e.target.value})} className="w-full p-3 border border-yellow-400 rounded-xl" /></div>
                                    </div>
                                </div>
                            )}

                            <button type="submit" disabled={age !== null && age < 11} className={`w-full py-4 rounded-xl font-black text-xl shadow-xl mt-6 ${age !== null && age < 11 ? 'bg-gray-300 text-gray-500' : 'bg-[#f8b417] text-[#003b49] hover:bg-yellow-400 transition'}`}>Finalizar Inscrição</button>
                        </form>
                    </div>
                </div>
            );
        }

        function UserDashboard({ user, onLogout, activities, setActivities }) {
            const [activeTab, setActiveTab] = useState('perfil'); 
            const [msg, setMsg] = useState(null);
            const [celebration, setCelebration] = useState(null); 
            const [bookData, setBookData] = useState({ title: '', author: '', year: '' });
            const [eventCheckinName, setEventCheckinName] = useState('');
            
            // Scheduling Tab States
            const [schedulingBookId, setSchedulingBookId] = useState('');
            const [scheduleDate, setScheduleDate] = useState('');
            const [scheduleTime, setScheduleTime] = useState('');

            const [isCheckingIn, setIsCheckingIn] = useState(false);
            const activeLibraryCheckin = activities.find(a => a.userId === user.id && a.type === 'checkin' && a.status === 'active');
            const activeEventCheckin = activities.find(a => a.userId === user.id && a.type === 'event' && a.status === 'active');
            const userActivities = activities.filter(a => a.userId === user.id);
            const totalPoints = calculateUserPoints(user.id, activities);

            const showMsg = (text, type) => { setMsg({ text, type }); setTimeout(() => setMsg(null), 5000); };
            const showCelebrationMsg = (text) => { setCelebration(text); setTimeout(() => setCelebration(null), 5000); };

            const downloadCarteirinha = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; canvas.height = 360;
                const ctx = canvas.getContext('2d');

                ctx.fillStyle = '#003b49'; ctx.fillRect(0, 0, 600, 360);
                ctx.fillStyle = '#f8b417'; ctx.fillRect(0, 0, 600, 100);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 30px sans-serif'; ctx.fillText('Redes Literárias', 30, 65);
                ctx.fillStyle = '#f8b417'; ctx.font = 'bold 22px sans-serif'; ctx.fillText('LEITOR OFICIAL', 30, 160);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 34px sans-serif'; ctx.fillText(user.nome.substring(0, 25), 30, 210);
                ctx.fillStyle = '#cbd5e1'; ctx.font = '20px sans-serif'; ctx.fillText(`Registro: ${user.registro}`, 30, 260);
                ctx.fillText(`CPF: ${user.documento}`, 30, 290);
                
                const drawProfile = (imgObj) => {
                    ctx.save(); ctx.beginPath(); ctx.arc(480, 200, 80, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
                    ctx.drawImage(imgObj, 400, 120, 160, 160);
                    ctx.restore();
                    ctx.strokeStyle = '#f8b417'; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.arc(480, 200, 80, 0, Math.PI * 2); ctx.stroke();
                    
                    const link = document.createElement('a'); link.download = `Carteirinha_${user.registro}.png`; link.href = canvas.toDataURL(); link.click();
                    showMsg('Carteirinha baixada com sucesso!', 'success');
                };

                const img = new Image(); img.crossOrigin = "Anonymous";
                img.onload = () => drawProfile(img);
                img.onerror = () => { showMsg('Erro ao carregar foto na carteirinha.', 'error'); };
                img.src = user.foto;
            };

            const handleRegisterBook = (e) => {
                e.preventDefault();
                if(!bookData.title || !bookData.author) return;
                const newActivity = { id: Date.now().toString(), userId: user.id, type: 'book', title: bookData.title, author: bookData.author, year: bookData.year, date: new Date().toISOString(), status: 'reading', points: 10, rating: 0 };
                setActivities([...activities, newActivity]); setBookData({ title: '', author: '', year: '' });
                showMsg('Livro registrado! Status: Lendo. Você ganhou 10 pontos.', 'success');
            };

            const updateBookStatus = (activityId, newStatus) => {
                setActivities(activities.map(act => act.id === activityId ? { ...act, status: newStatus, lastUpdate: new Date().toISOString() } : act));
                if (newStatus === 'read') showCelebrationMsg("Parabéns! Você concluiu mais uma leitura! 🎉");
                else showMsg(`Status atualizado para: ${newStatus}`, 'success');
            };

            const handleRateBook = (activityId, star) => {
                setActivities(activities.map(act => act.id === activityId ? { ...act, rating: star } : act));
            };

            // Função CORRIGIDA para manipular a data sem crashar
            const handleScheduleDate = (e) => {
                const dateStr = e.target.value;
                if(!dateStr) { setScheduleDate(''); return; }
                
                const [y, m, d] = dateStr.split('-');
                const dateObj = new Date(y, m - 1, d);
                const dayOfWeek = dateObj.getDay(); // 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
                
                if (dayOfWeek < 2 || dayOfWeek > 4) { 
                    showMsg('Agendamentos apenas de Terça a Quinta-feira.', 'error'); 
                    setScheduleDate(''); 
                } else { 
                    setScheduleDate(dateStr); 
                }
            };

            const confirmSchedule = (e) => {
                e.preventDefault();
                if(!scheduleDate || !scheduleTime || !schedulingBookId) return;
                
                const updated = activities.map(act => {
                    if (act.id === schedulingBookId) return { ...act, status: 'schedule_pending', scheduleDate, scheduleTime, lastUpdate: new Date().toISOString() };
                    return act;
                });
                setActivities(updated);
                setSchedulingBookId(''); setScheduleDate(''); setScheduleTime('');
                setActiveTab('leituras');
                showMsg('Solicitação enviada! Aguarde o Administrador confirmar o seu agendamento.', 'success');
            };

            const handleCheckInLibrary = () => {
                setIsCheckingIn(true);
                setTimeout(() => {
                    const newAct = { id: Date.now().toString(), userId: user.id, type: 'checkin', status: 'active', checkInTime: new Date().toISOString(), date: new Date().toISOString().split('T')[0] };
                    setActivities([...activities, newAct]); showMsg(`Check-in na biblioteca realizado!`, 'success'); setIsCheckingIn(false);
                }, 1000);
            };

            const handleCheckOutLibrary = () => {
                if(!activeLibraryCheckin) return;
                const diffMinutes = Math.floor(Math.abs(new Date() - new Date(activeLibraryCheckin.checkInTime)) / 60000);
                const earned = calcVisitPoints(diffMinutes);
                
                if (earned === 0) {
                    setActivities(activities.map(act => act.id === activeLibraryCheckin.id ? { ...act, status: 'completed', checkOutTime: new Date().toISOString(), points: 0 } : act));
                    showMsg(`Check-out. Você ficou menos de 20 minutos, portanto não pontuou desta vez.`, 'error');
                } else {
                    setActivities(activities.map(act => act.id === activeLibraryCheckin.id ? { ...act, status: 'completed', checkOutTime: new Date().toISOString(), points: earned } : act));
                    showMsg(`Check-out realizado! Você ganhou ${earned} pontos.`, 'success');
                }
            };

            const handleCheckInEvent = (e) => {
                e.preventDefault();
                if(!eventCheckinName) return;
                const newAct = { id: Date.now().toString(), userId: user.id, type: 'event', title: eventCheckinName, status: 'active', checkInTime: new Date().toISOString(), date: new Date().toISOString().split('T')[0] };
                setActivities([...activities, newAct]); setEventCheckinName(''); showMsg(`Check-in no Evento realizado!`, 'success');
            };

            const handleCheckOutEvent = () => {
                if(!activeEventCheckin) return;
                setActivities(activities.map(act => act.id === activeEventCheckin.id ? { ...act, status: 'completed', checkOutTime: new Date().toISOString(), points: 30 } : act));
                showCelebrationMsg(`Incrível! Presença no evento confirmada! +30 pts 🎉`);
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-10">
                    <header className="bg-[#003b49] text-white p-4 shadow-lg sticky top-0 z-40 border-b-4 border-[#f8b417]">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="Redes%20liter%C3%A1rias_Biblioteca%20(1).png" className="w-12 h-12 bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}} />
                                <div><h1 className="font-black text-xl">Área do Leitor</h1></div>
                            </div>
                            <button onClick={onLogout} className="bg-red-500 px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-red-600"><i className="fas fa-sign-out-alt"></i> Sair</button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto mt-6 px-4">
                        {msg && <div className={`p-4 mb-6 rounded-2xl font-bold shadow-md flex items-center border-l-4 ${msg.type === 'success' ? 'bg-green-100 text-green-800 border-green-500' : 'bg-red-100 text-red-800 border-red-500'}`}><i className={`fas mr-3 text-2xl ${msg.type==='success'?'fa-check-circle':'fa-exclamation-circle'}`}></i> {msg.text}</div>}

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white rounded-[2rem] shadow-lg p-6 text-center border border-gray-100 relative overflow-hidden">
                                    <div className="h-20 bg-[#f8b417] absolute top-0 left-0 w-full rounded-b-3xl"></div>
                                    <img src={user.foto} className="w-32 h-32 mx-auto rounded-full border-4 border-white shadow-xl relative z-10 object-cover bg-gray-200 mt-4" />
                                    <h2 className="font-black text-xl mt-4 text-[#003b49]">{user.nome}</h2>
                                    <p className="text-sm font-bold text-gray-500 bg-gray-100 py-1 px-3 rounded-lg inline-block mt-2">Reg: {user.registro}</p>
                                    <button onClick={downloadCarteirinha} className="w-full mt-4 bg-gray-900 text-white font-bold py-2 rounded-xl text-sm hover:bg-gray-800 shadow"><i className="fas fa-id-card mr-2"></i>Baixar Carteirinha</button>
                                    
                                    <div className="mt-6 bg-blue-50 border border-blue-100 rounded-2xl p-4 shadow-inner">
                                        <p className="text-xs font-black uppercase text-blue-800 tracking-widest mb-1">Pontuação Total</p>
                                        <p className="text-5xl font-black text-[#003b49]">{totalPoints}</p>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-br from-indigo-800 to-blue-900 rounded-[2rem] p-6 text-white shadow-lg text-center relative overflow-hidden">
                                    <i className="fas fa-book-reader absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                                    <h3 className="font-black text-lg mb-2 text-indigo-200">Visita à Biblioteca</h3>
                                    <p className="text-xs text-blue-100 mb-5 leading-relaxed">20m = 0.5pt | 30m = 1pt | 40m = 2pts | 1h = 3pts</p>
                                    {activeLibraryCheckin ? (
                                        <div className="space-y-3">
                                            <div className="bg-white bg-opacity-20 rounded-xl p-3 text-sm font-bold animate-pulse"><i className="fas fa-clock mr-2"></i> Visita Ativa</div>
                                            <button onClick={handleCheckOutLibrary} className="w-full bg-red-500 text-white font-black py-3 rounded-xl hover:bg-red-600 shadow-lg">Fazer Check-out</button>
                                        </div>
                                    ) : (
                                        <button onClick={handleCheckInLibrary} disabled={isCheckingIn} className="w-full bg-[#f8b417] text-[#003b49] font-black py-3 rounded-xl hover:bg-yellow-400 shadow-lg">
                                            {isCheckingIn ? <i className="fas fa-spinner fa-spin"></i> : <><i className="fas fa-sign-in-alt mr-2"></i> Check-in Leitura</>}
                                        </button>
                                    )}
                                </div>

                                <div className="bg-gradient-to-br from-purple-800 to-pink-900 rounded-[2rem] p-6 text-white shadow-lg text-center relative overflow-hidden">
                                    <i className="fas fa-star absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                                    <h3 className="font-black text-lg mb-2 text-pink-200">Participação em Eventos</h3>
                                    <p className="text-xs text-pink-100 mb-5 leading-relaxed">Participe e garanta +30 pontos</p>
                                    {activeEventCheckin ? (
                                        <div className="space-y-3">
                                            <div className="bg-white bg-opacity-20 rounded-xl p-3 text-xs font-bold animate-pulse break-words"><i className="fas fa-calendar-check mr-2"></i> Evento: {activeEventCheckin.title}</div>
                                            <button onClick={handleCheckOutEvent} className="w-full bg-red-500 text-white font-black py-3 rounded-xl hover:bg-red-600 shadow-lg">Finalizar Evento (+30pts)</button>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleCheckInEvent} className="space-y-3">
                                            <input required type="text" placeholder="Nome do Evento" value={eventCheckinName} onChange={e=>setEventCheckinName(e.target.value)} className="w-full p-3 rounded-xl border-none text-gray-900 text-sm font-bold focus:ring-2 focus:ring-pink-400" />
                                            <button type="submit" className="w-full bg-pink-500 text-white font-black py-3 rounded-xl hover:bg-pink-400 shadow-lg"><i className="fas fa-calendar-plus mr-2"></i> Iniciar Evento</button>
                                        </form>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm p-2 flex gap-2 overflow-x-auto border border-gray-200">
                                    <button onClick={() => setActiveTab('perfil')} className={`flex-1 py-3 px-4 min-w-[120px] rounded-xl font-black text-sm transition ${activeTab === 'perfil' ? 'bg-[#003b49] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-list-ul mr-2"></i> Histórico</button>
                                    <button onClick={() => setActiveTab('leituras')} className={`flex-1 py-3 px-4 min-w-[120px] rounded-xl font-black text-sm transition ${activeTab === 'leituras' ? 'bg-[#003b49] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-book-open mr-2"></i> Minhas Leituras</button>
                                    <button onClick={() => setActiveTab('agendar')} className={`flex-1 py-3 px-4 min-w-[120px] rounded-xl font-black text-sm transition ${activeTab === 'agendar' ? 'bg-orange-500 text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-calendar-alt mr-2"></i> Agendar Resumo</button>
                                </div>

                                {activeTab === 'perfil' && (
                                    <div className="bg-white rounded-[2rem] shadow-lg p-6 border border-gray-100 min-h-[400px]">
                                        <h3 className="font-black text-2xl text-[#003b49] mb-6 border-b pb-4">Timeline de Atividades</h3>
                                        {userActivities.length === 0 ? <p className="text-gray-400 text-center py-10 font-bold">Nenhuma atividade registrada.</p> : (
                                            <div className="space-y-4">
                                                {userActivities.slice().reverse().map(act => (
                                                    <div key={act.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white ${act.type==='book'?'bg-blue-500':act.type==='checkin'?'bg-indigo-500':act.type==='event'?'bg-pink-500':act.type==='penalty'?'bg-red-500':'bg-green-500'}`}>
                                                                <i className={`fas ${act.type==='book'?'fa-book':act.type==='checkin'?'fa-map-marker-alt':act.type==='event'?'fa-star':act.type==='penalty'?'fa-ban':'fa-check'}`}></i>
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-gray-800">{act.title || (act.type === 'checkin' ? 'Visita à Biblioteca' : 'Infração')}</p>
                                                                <p className="text-xs text-gray-500 font-bold">{new Date(act.date || act.checkInTime).toLocaleDateString()}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            {act.type === 'penalty' ? <span className="text-red-600 font-black px-3 py-1 bg-red-100 rounded-lg">-{act.pointsDeducted} pts</span> : 
                                                             act.status === 'active' ? <span className="text-indigo-600 font-bold px-3 py-1 bg-indigo-100 rounded-lg">Em andamento</span> :
                                                             <span className="text-green-600 font-black px-3 py-1 bg-green-100 rounded-lg">+{act.points} pts</span>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'leituras' && (
                                    <div className="bg-white rounded-[2rem] shadow-lg p-6 border border-gray-100 min-h-[400px]">
                                        <div className="bg-blue-50 p-6 rounded-3xl mb-8 border border-blue-100">
                                            <h3 className="font-black text-xl text-[#003b49] mb-4">Adicionar Nova Leitura</h3>
                                            <form onSubmit={handleRegisterBook} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <input required type="text" placeholder="Título do Livro" value={bookData.title} onChange={e=>setBookData({...bookData, title:e.target.value})} className="p-3 rounded-xl border focus:ring-2 focus:ring-[#003b49]" />
                                                <input required type="text" placeholder="Autor" value={bookData.author} onChange={e=>setBookData({...bookData, author:e.target.value})} className="p-3 rounded-xl border focus:ring-2 focus:ring-[#003b49]" />
                                                <div className="flex gap-2">
                                                    <input type="number" placeholder="Ano" value={bookData.year} onChange={e=>setBookData({...bookData, year:e.target.value})} className="p-3 rounded-xl border focus:ring-2 focus:ring-[#003b49] w-24" />
                                                    <button type="submit" className="flex-1 bg-[#003b49] text-white font-bold rounded-xl hover:bg-gray-800 transition">Salvar (+10 pts)</button>
                                                </div>
                                            </form>
                                        </div>

                                        <h3 className="font-black text-xl text-[#003b49] mb-4">Livros na Estante</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {userActivities.filter(a => a.type === 'book').reverse().map(book => (
                                                <div key={book.id} className="p-5 border-2 border-gray-100 rounded-2xl relative group bg-white shadow-sm hover:shadow-md transition">
                                                    <h4 className="font-black text-lg text-gray-800 leading-tight pr-8">{book.title}</h4>
                                                    <p className="text-sm text-gray-500 mb-3">{book.author} {book.year ? `(${book.year})` : ''}</p>
                                                    
                                                    <div className="flex items-center mb-4 bg-gray-50 p-2 rounded-xl inline-flex">
                                                        <span className="text-xs font-bold text-gray-400 mr-2 uppercase">Sua Nota:</span>
                                                        <div className="flex gap-1">
                                                            {[1,2,3,4,5].map(star => (
                                                                <i key={star} onClick={() => handleRateBook(book.id, star)} className={`fas fa-star cursor-pointer transition-colors text-lg ${book.rating >= star ? 'text-yellow-400' : 'text-gray-300 hover:text-yellow-200'}`}></i>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="bg-gray-50 p-3 rounded-xl mt-2 border border-gray-100">
                                                        <p className="text-xs font-bold text-gray-400 mb-2 uppercase">Status Atual:</p>
                                                        {book.status === 'reading' && (
                                                            <div className="flex gap-2">
                                                                <span className="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-sm font-bold flex-1 text-center">Lendo</span>
                                                                <button onClick={() => updateBookStatus(book.id, 'read')} className="bg-green-500 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-green-600 shadow-sm"><i className="fas fa-check mr-1"></i> Marcar Lido</button>
                                                            </div>
                                                        )}
                                                        {book.status === 'read' && (
                                                            <div className="flex flex-col gap-2">
                                                                <span className="bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-sm font-bold text-center">Livro Lido</span>
                                                                <button onClick={() => { setActiveTab('agendar'); setSchedulingBookId(book.id); }} className="bg-orange-500 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-orange-600 shadow-sm"><i className="fas fa-calendar-alt mr-2"></i>Agendar Entrega de Resumo</button>
                                                            </div>
                                                        )}
                                                        {book.status === 'schedule_pending' && (
                                                            <span className="block w-full bg-yellow-100 text-yellow-800 px-3 py-2 rounded-lg text-sm font-bold text-center"><i className="fas fa-hourglass-half mr-1"></i> Agendamento em análise ({book.scheduleDate.split('-').reverse().join('/')} às {book.scheduleTime})</span>
                                                        )}
                                                        {book.status === 'schedule_approved' && (
                                                            <span className="block w-full bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold text-center"><i className="fas fa-calendar-check mr-1"></i> Resumo Agendado ({book.scheduleDate.split('-').reverse().join('/')} às {book.scheduleTime})</span>
                                                        )}
                                                        {book.status === 'summary_approved' && (
                                                            <span className="block w-full bg-green-100 text-green-700 px-3 py-2 rounded-lg text-sm font-bold text-center"><i className="fas fa-check-double mr-1"></i> Resumo Aprovado (+50 pts)</span>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'agendar' && (
                                    <div className="bg-white rounded-[2rem] shadow-lg p-6 border border-gray-100 min-h-[400px]">
                                        <h3 className="font-black text-2xl text-[#003b49] mb-4 border-b pb-4">Agendar Entrega de Resumo</h3>
                                        
                                        <div className="bg-orange-50 p-6 rounded-2xl mb-6 border-l-4 border-orange-500 shadow-sm">
                                            <p className="text-orange-900 font-bold text-lg mb-2"><i className="fas fa-exclamation-circle mr-2"></i>Aviso Importante</p>
                                            <p className="text-sm text-orange-800 font-medium leading-relaxed">
                                                O resumo é entregue <strong>presencialmente sem consulta</strong> na biblioteca municipal Dr. Délio Ledoux mediante agendamento prévio.
                                                <br/><br/>Dias de atendimento: <strong>Terça a Quinta-feira, das 09h às 17h30</strong>.
                                            </p>
                                        </div>
                                        
                                        {userActivities.filter(a => a.type === 'book' && a.status === 'read').length === 0 ? (
                                            <div className="text-center py-10">
                                                <i className="fas fa-book-open fa-3x text-gray-300 mb-4"></i>
                                                <p className="text-gray-500 font-bold text-lg">Nenhum livro aguardando agendamento.</p>
                                                <p className="text-sm text-gray-400 mt-2">Termine uma leitura e marque como "Lido" para agendar.</p>
                                            </div>
                                        ) : (
                                            <form onSubmit={confirmSchedule} className="space-y-4 max-w-md">
                                                <div>
                                                    <label className="block text-sm font-bold mb-1">Selecione o Livro Lido</label>
                                                    <select required value={schedulingBookId} onChange={e => setSchedulingBookId(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50">
                                                        <option value="">Escolha um livro...</option>
                                                        {userActivities.filter(a => a.type === 'book' && a.status === 'read').map(b => (
                                                            <option key={b.id} value={b.id}>{b.title} - {b.author}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold mb-1">Data Desejada (Terça a Quinta)</label>
                                                    <input required type="date" min={new Date().toISOString().split('T')[0]} value={scheduleDate} onChange={handleScheduleDate} className="w-full p-3 border rounded-xl bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold mb-1">Horário (09:00 às 17:30)</label>
                                                    <input required type="time" min="09:00" max="17:30" value={scheduleTime} onChange={e=>setScheduleTime(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50" />
                                                </div>
                                                <button type="submit" disabled={!scheduleDate || !scheduleTime || !schedulingBookId} className="w-full bg-orange-500 text-white font-black py-4 rounded-xl mt-4 shadow-lg hover:bg-orange-600 disabled:opacity-50">Enviar Solicitação de Agendamento</button>
                                            </form>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {celebration && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black bg-opacity-50 backdrop-blur-sm">
                                <div className="bg-white rounded-[2rem] shadow-2xl p-8 max-w-sm w-full text-center animate-pop-in border-4 border-[#f8b417]">
                                    <div className="text-6xl mb-4">🎉</div>
                                    <h3 className="font-black text-2xl text-[#003b49] mb-2">Parabéns!</h3>
                                    <p className="font-bold text-gray-600 text-lg">{celebration}</p>
                                    <button onClick={() => setCelebration(null)} className="mt-6 w-full bg-[#f8b417] text-[#003b49] font-black py-3 rounded-xl hover:bg-yellow-400 shadow-md">Show!</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function AdminDashboard({ onLogout, users, setUsers, activities, setActivities }) {
            const [activeTab, setActiveTab] = useState('leituras'); 
            const [msg, setMsg] = useState(null);
            const [celebration, setCelebration] = useState(null);
            
            const [editingUser, setEditingUser] = useState(null);
            const [penalizingUser, setPenalizingUser] = useState(null);
            const [penaltyData, setPenaltyData] = useState({ reason: '', points: 10 });

            const showMsg = (text, type) => { setMsg({ text, type }); setTimeout(() => setMsg(null), 4000); };
            const showCelebrationMsg = (text) => { setCelebration(text); setTimeout(() => setCelebration(null), 5000); };

            const pendingSchedules = activities.filter(a => a.type === 'book' && a.status === 'schedule_pending');
            const approvedSchedules = activities.filter(a => a.type === 'book' && a.status === 'schedule_approved');
            
            const handleApproveSchedule = (activityId) => {
                setActivities(activities.map(act => act.id === activityId ? { ...act, status: 'schedule_approved' } : act));
                showMsg('Horário aprovado! O leitor deve comparecer.', 'success');
            };

            const handleRejectSchedule = (activityId) => {
                setActivities(activities.map(act => act.id === activityId ? { ...act, status: 'read', scheduleDate: null, scheduleTime: null } : act));
                showMsg('Agendamento rejeitado.', 'error');
            };

            const handleConfirmSummaryDelivery = (activityId) => {
                setActivities(activities.map(act => act.id === activityId ? { ...act, status: 'summary_approved', points: 50 } : act));
                showCelebrationMsg('Fantástico! Resumo aprovado e 50 pontos liberados para o leitor! 🎉');
            };

            const handleDeleteUser = (userId) => {
                if(window.confirm('TEM CERTEZA? Isso excluirá o leitor permanentemente.')) {
                    setUsers(users.filter(u => u.id !== userId));
                    setActivities(activities.filter(a => a.userId !== userId));
                    showMsg('Leitor excluído com sucesso.', 'success');
                }
            };

            const handleSaveUserEdit = (e) => {
                e.preventDefault();
                setUsers(users.map(u => u.id === editingUser.id ? editingUser : u));
                setEditingUser(null);
                showMsg('Dados atualizados.', 'success');
            };

            const handleApplyPenalty = (e) => {
                e.preventDefault();
                if(!penaltyData.reason) return;
                const newAct = { id: Date.now().toString(), userId: penalizingUser.id, type: 'penalty', title: `Infração: ${penaltyData.reason}`, date: new Date().toISOString(), pointsDeducted: parseInt(penaltyData.points) };
                setActivities([...activities, newAct]);
                setPenalizingUser(null); setPenaltyData({reason:'', points:10});
                showMsg('Infração aplicada com sucesso.', 'error'); 
            };

            const handleAdminExportData = () => {
                const rankingExport = users.map(user => ({ ...user, points: calculateUserPoints(user.id, activities) })).sort((a, b) => b.points - a.points);
                exportToExcel(users, activities, rankingExport);
            };

            const ranking = users.map(user => ({ ...user, points: calculateUserPoints(user.id, activities) })).sort((a, b) => b.points - a.points);
            const getUserInfo = (userId) => users.find(u => u.id === userId);
            const completedEvents = activities.filter(a => a.type === 'event' && a.status === 'completed').reverse();

            return (
                <div className="min-h-screen bg-gray-50 pb-10">
                    <header className="bg-gray-900 text-white p-4 shadow-xl sticky top-0 z-40 border-b-4 border-[#f8b417]">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="font-black text-xl"><i className="fas fa-shield-alt mr-2 text-[#f8b417]"></i> Administração</h1>
                            <button onClick={onLogout} className="bg-red-600 px-4 py-2 rounded-xl font-bold"><i className="fas fa-power-off"></i> Sair</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto mt-6 px-4">
                        {msg && <div className={`p-4 mb-6 rounded-xl font-bold shadow flex items-center ${msg.type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>{msg.text}</div>}

                        <div className="flex overflow-x-auto bg-white rounded-2xl shadow-sm mb-6 border border-gray-200">
                            <button onClick={()=>setActiveTab('leituras')} className={`py-4 px-6 font-black text-sm whitespace-nowrap transition ${activeTab==='leituras'?'bg-[#003b49] text-white':'text-gray-600'}`}><i className="fas fa-book-reader mr-2"></i> Gestão de Resumos {(pendingSchedules.length + approvedSchedules.length) > 0 && <span className="bg-red-500 text-white ml-2 px-2 py-0.5 rounded-full">{pendingSchedules.length + approvedSchedules.length}</span>}</button>
                            <button onClick={()=>setActiveTab('leitores')} className={`py-4 px-6 font-black text-sm whitespace-nowrap transition border-l ${activeTab==='leitores'?'bg-[#003b49] text-white':'text-gray-600'}`}><i className="fas fa-users-cog mr-2"></i> Gestão de Leitores</button>
                            <button onClick={()=>setActiveTab('eventos')} className={`py-4 px-6 font-black text-sm whitespace-nowrap transition border-l ${activeTab==='eventos'?'bg-[#003b49] text-white':'text-gray-600'}`}><i className="fas fa-star mr-2"></i> Eventos Finalizados</button>
                            <button onClick={()=>setActiveTab('ranking')} className={`py-4 px-6 font-black text-sm whitespace-nowrap transition border-l ${activeTab==='ranking'?'bg-[#003b49] text-white':'text-gray-600'}`}><i className="fas fa-trophy mr-2"></i> Ranking</button>
                            <button onClick={()=>setActiveTab('exportar')} className={`py-4 px-6 font-black text-sm whitespace-nowrap transition border-l ${activeTab==='exportar'?'bg-[#003b49] text-white':'text-gray-600'}`}><i className="fas fa-file-excel mr-2"></i> Planilhas Gerais</button>
                        </div>

                        <div className="bg-white rounded-[2rem] shadow-xl p-6 border border-gray-100 min-h-[500px]">
                            
                            {activeTab === 'leituras' && (
                                <div className="space-y-10">
                                    <div>
                                        <h2 className="text-2xl font-black text-gray-800 mb-4 border-b pb-2">1. Solicitações de Agendamento (Pendentes)</h2>
                                        {pendingSchedules.length === 0 ? <p className="text-gray-500 font-bold">Nenhuma solicitação pendente.</p> : (
                                            <div className="grid gap-4">
                                                {pendingSchedules.map(act => {
                                                    const u = getUserInfo(act.userId); if(!u) return null;
                                                    return (
                                                        <div key={act.id} className="flex flex-col md:flex-row md:items-center justify-between p-5 border-2 border-yellow-200 bg-yellow-50 rounded-2xl">
                                                            <div className="flex items-center gap-4 mb-4 md:mb-0">
                                                                <img src={u.foto} className="w-14 h-14 rounded-full object-cover border shadow-sm" />
                                                                <div>
                                                                    <p className="font-black text-lg">{u.nome} <span className="text-xs bg-white px-2 rounded border">{u.registro}</span></p>
                                                                    <p className="text-sm font-bold text-yellow-800"><i className="fas fa-book mr-1"></i> {act.title} ({act.author})</p>
                                                                    <p className="text-sm font-black text-indigo-700 mt-1"><i className="fas fa-clock mr-1"></i> Solicitado para: {act.scheduleDate.split('-').reverse().join('/')} às {act.scheduleTime}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => handleApproveSchedule(act.id)} className="bg-green-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-green-700 shadow"><i className="fas fa-check mr-2"></i> Aprovar Horário</button>
                                                                <button onClick={() => handleRejectSchedule(act.id)} className="bg-red-100 text-red-700 px-4 py-2 rounded-xl font-bold hover:bg-red-200"><i className="fas fa-times"></i> Rejeitar</button>
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    <div>
                                        <h2 className="text-2xl font-black text-gray-800 mb-4 border-b pb-2">2. Aguardando Entrega de Resumo (Horário Aprovado)</h2>
                                        {approvedSchedules.length === 0 ? <p className="text-gray-500 font-bold">Nenhum resumo agendado para entrega.</p> : (
                                            <div className="grid gap-4">
                                                {approvedSchedules.map(act => {
                                                    const u = getUserInfo(act.userId); if(!u) return null;
                                                    return (
                                                        <div key={act.id} className="flex flex-col md:flex-row md:items-center justify-between p-5 border-2 border-indigo-200 bg-indigo-50 rounded-2xl">
                                                            <div className="flex items-center gap-4 mb-4 md:mb-0">
                                                                <img src={u.foto} className="w-14 h-14 rounded-full object-cover border shadow-sm" />
                                                                <div>
                                                                    <p className="font-black text-lg">{u.nome}</p>
                                                                    <p className="text-sm font-bold text-indigo-800"><i className="fas fa-book mr-1"></i> {act.title}</p>
                                                                    <p className="text-sm font-black text-indigo-700 mt-1"><i className="fas fa-calendar-check mr-1"></i> Agendado: {act.scheduleDate.split('-').reverse().join('/')} às {act.scheduleTime}</p>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => handleConfirmSummaryDelivery(act.id)} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black hover:bg-indigo-700 shadow-lg whitespace-nowrap"><i className="fas fa-check-double mr-2"></i> Confirmar Entrega (+50 pts)</button>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'leitores' && (
                                <div className="overflow-x-auto border border-gray-200 rounded-3xl">
                                    <table className="w-full text-left border-collapse text-sm">
                                        <thead className="bg-gray-100 text-gray-600 font-bold uppercase text-xs">
                                            <tr><th className="p-5">Leitor</th><th className="p-5">Contato / Endereço</th><th className="p-5">Responsável (Menor)</th><th className="p-5 text-right">Ações</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {users.map(u => (
                                                <tr key={u.id} className="hover:bg-blue-50">
                                                    <td className="p-5 flex items-center gap-3">
                                                        <img src={u.foto} className="w-10 h-10 rounded-full object-cover border" />
                                                        <div><p className="font-bold text-gray-900">{u.nome}</p><p className="text-xs font-mono text-gray-500">Reg: {u.registro} | CPF: {u.documento}</p><p className="text-xs text-blue-600 font-bold">{u.idade} anos</p></div>
                                                    </td>
                                                    <td className="p-5"><p><i className="fab fa-whatsapp text-green-500"></i> {u.telefone}</p><p className="text-xs text-gray-500 truncate max-w-[200px]" title={u.endereco}>{u.endereco}</p></td>
                                                    <td className="p-5">
                                                        {u.idade < 18 ? <div><p className="font-bold text-yellow-700">{u.nomeResponsavel}</p><p className="text-xs">{u.vinculoResponsavel} | {u.telefoneResponsavel}</p></div> : <span className="text-gray-400 italic">Maior de Idade</span>}
                                                    </td>
                                                    <td className="p-5 text-right">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={()=>setPenalizingUser(u)} className="bg-orange-100 text-orange-700 p-2 rounded" title="Infração"><i className="fas fa-gavel"></i></button>
                                                            <button onClick={()=>setEditingUser(u)} className="bg-blue-100 text-blue-700 p-2 rounded" title="Editar"><i className="fas fa-edit"></i></button>
                                                            <button onClick={()=>handleDeleteUser(u.id)} className="bg-red-100 text-red-700 p-2 rounded" title="Excluir"><i className="fas fa-trash-alt"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'eventos' && (
                                <div className="max-w-4xl">
                                    <h2 className="text-2xl font-black text-gray-800 mb-6 border-b pb-2">Histórico de Presenças em Eventos</h2>
                                    {completedEvents.length === 0 ? <p className="text-gray-500 font-bold">Nenhum check-out de evento registrado.</p> : (
                                        <div className="grid gap-4">
                                            {completedEvents.map(ev => {
                                                const u = getUserInfo(ev.userId); if(!u) return null;
                                                return (
                                                    <div key={ev.id} className="p-4 border border-pink-200 bg-pink-50 rounded-2xl flex items-center justify-between">
                                                        <div className="flex items-center gap-4">
                                                            <div className="bg-pink-500 text-white w-10 h-10 rounded-full flex items-center justify-center"><i className="fas fa-star"></i></div>
                                                            <div>
                                                                <p className="font-bold text-gray-900">{ev.title}</p>
                                                                <p className="text-sm text-gray-600">Leitor: {u.nome} (Reg: {u.registro})</p>
                                                            </div>
                                                        </div>
                                                        <span className="font-black text-pink-700 bg-pink-200 px-3 py-1 rounded-lg">+{ev.points} pts</span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'ranking' && (
                                <div className="overflow-x-auto border border-gray-200 rounded-3xl">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-50 text-gray-500 uppercase text-xs border-b"><tr><th className="p-5 text-center">Pos</th><th className="p-5">Leitor</th><th className="p-5 text-right">Pontos</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {ranking.map((user, index) => (
                                                <tr key={user.id} className="hover:bg-yellow-50 transition">
                                                    <td className="p-5 text-center font-black text-lg text-gray-400">
                                                        {index === 0 ? <span className="text-yellow-500 text-2xl"><i className="fas fa-crown"></i> 1º</span> : 
                                                         index === 1 ? <span className="text-gray-400 text-xl"><i className="fas fa-medal"></i> 2º</span> : 
                                                         index === 2 ? <span className="text-orange-400 text-xl"><i className="fas fa-award"></i> 3º</span> : `${index + 1}º`}
