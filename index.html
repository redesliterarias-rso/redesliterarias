                                                    </td>
                                                    <td className="p-5 flex items-center gap-4"><img src={user.foto} className="w-12 h-12 rounded-full object-cover border shadow-sm" /><span className="font-bold text-gray-800 text-lg">{user.nome}</span></td>
                                                    <td className="p-5 text-right"><span className="bg-blue-50 text-[#003b49] border border-blue-200 px-4 py-2 rounded-xl font-black text-2xl">{user.points}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'exportar' && (
                                <div className="text-center py-16 max-w-lg mx-auto">
                                    <i className="fas fa-file-excel fa-5x text-green-600 mb-6"></i>
                                    <h2 className="text-3xl font-black text-gray-800 mb-4">Planilha Completa do Sistema</h2>
                                    <p className="text-gray-500 mb-8 font-medium">Baixe um arquivo do Excel (.xlsx) contendo 5 abas separadas com todos os dados de Leitores, Livros, Eventos, Infrações e o Ranking oficial.</p>
                                    <button onClick={handleAdminExportData} className="bg-green-600 text-white font-black text-xl px-10 py-5 w-full rounded-2xl shadow-xl hover:bg-green-700 flex justify-center items-center"><i className="fas fa-download mr-3"></i> Baixar Relatório (Excel)</button>
                                </div>
                            )}
                            
                            {editingUser && (
                                <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[2rem] shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative">
                                        <button onClick={()=>setEditingUser(null)} className="absolute top-6 right-6 text-gray-400"><i className="fas fa-times fa-2x"></i></button>
                                        <h3 className="font-black text-2xl mb-6 border-b pb-4">Editar Cadastro</h3>
                                        <form onSubmit={handleSaveUserEdit} className="space-y-4">
                                            <div><label className="block text-sm font-bold">Nome</label><input type="text" value={editingUser.nome} onChange={e=>setEditingUser({...editingUser, nome:e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                            <div><label className="block text-sm font-bold">Documento</label><input type="text" value={editingUser.documento} onChange={e=>setEditingUser({...editingUser, documento:e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                            <div><label className="block text-sm font-bold">Telefone</label><input type="text" value={editingUser.telefone} onChange={e=>setEditingUser({...editingUser, telefone:e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                            <button type="submit" className="w-full bg-[#003b49] text-white font-bold py-4 rounded-xl mt-4">Salvar Alterações</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {penalizingUser && (
                                <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[2rem] shadow-2xl p-8 max-w-md w-full relative">
                                        <button onClick={()=>setPenalizingUser(null)} className="absolute top-6 right-6 text-gray-400"><i className="fas fa-times fa-2x"></i></button>
                                        <div className="text-center mb-6"><div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-2"><i className="fas fa-gavel fa-2xl"></i></div><h3 className="font-black text-xl">Aplicar Infração</h3><p className="font-bold">{penalizingUser.nome}</p></div>
                                        <form onSubmit={handleApplyPenalty} className="space-y-4">
                                            <div><label className="block text-sm font-bold mb-1">Motivo</label><input required type="text" value={penaltyData.reason} onChange={e=>setPenaltyData({...penaltyData, reason:e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                            <div><label className="block text-sm font-bold mb-1">Pontos Deduzidos</label><input required type="number" step="0.1" min="0.1" value={penaltyData.points} onChange={e=>setPenaltyData({...penaltyData, points:e.target.value})} className="w-full p-3 border rounded-xl" /></div>
                                            <button type="submit" className="w-full bg-red-600 text-white font-black py-4 rounded-xl hover:bg-red-700">Confirmar Penalidade</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {celebration && (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black bg-opacity-50 backdrop-blur-sm">
                                    <div className="bg-white rounded-[2rem] shadow-2xl p-8 max-w-sm w-full text-center animate-pop-in border-4 border-green-500">
                                        <div className="text-6xl mb-4">🏆</div>
                                        <h3 className="font-black text-2xl text-green-700 mb-2">Sucesso!</h3>
                                        <p className="font-bold text-gray-600 text-lg">{celebration}</p>
                                        <button onClick={() => setCelebration(null)} className="mt-6 w-full bg-green-600 text-white font-black py-3 rounded-xl hover:bg-green-700 shadow-md">Ok</button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
