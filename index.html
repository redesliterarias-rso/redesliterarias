<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Redes Literárias</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (para JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Excel Export (SheetJS) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- HTML2Canvas (Para baixar a carteirinha) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-net {
            background-color: #f8b417;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px),
                radial-gradient(circle at 15px 15px, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 30px 30px, 30px 30px, 30px 30px;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- CONEXÃO SEGURA E ESTÁVEL COM O FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjGF-lwJt1Lk7zlEZou42zQRiUOfPlh24",
            authDomain: "redes-literarias-rso.firebaseapp.com",
            databaseURL: "https://redes-literarias-rso-default-rtdb.firebaseio.com",
            projectId: "redes-literarias-rso",
            storageBucket: "redes-literarias-rso.firebasestorage.app",
            messagingSenderId: "469426150346",
            appId: "1:469426150346:web:bec753b21cf64b7eca8d33"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.db = db;
            window.fb = { collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where };
            window.dispatchEvent(new Event('firebase-ready'));
            console.log("Banco de dados conectado com sucesso!");
        } catch (error) {
            console.error("Erro Crítico no Firebase:", error);
        }
    </script>

    <!-- CÓDIGO DA PLATAFORMA (REACT) -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Data limite configurada para 31/07/2026 às 23:59:59
        const DEADLINE = new Date('2026-07-31T23:59:59-03:00');

        function App() {
            const [currentView, setCurrentView] = useState('login'); 
            const [currentUser, setCurrentUser] = useState(null);
            
            // Dados da Nuvem
            const [users, setUsers] = useState([]);
            const [activities, setActivities] = useState([]); 
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [dbError, setDbError] = useState(null);
            const [loadingMessage, setLoadingMessage] = useState("Conectando à Nuvem...");

            // Carregamento Super Seguro
            useEffect(() => {
                let isMounted = true;
                let unsubUsers = null;
                let unsubActs = null;

                const startDatabase = () => {
                    if (!window.db) return;
                    try {
                        const usersRef = window.fb.collection(window.db, "users");
                        const actRef = window.fb.collection(window.db, "activities");

                        unsubUsers = window.fb.onSnapshot(usersRef, (snapshot) => {
                            if (!isMounted) return;
                            const loadedUsers = [];
                            snapshot.forEach((doc) => loadedUsers.push({ ...doc.data(), dbId: doc.id }));
                            setUsers(loadedUsers);
                        }, (error) => {
                            console.error(error);
                            if (isMounted) setDbError("Erro de Regras do Firebase. O tempo de teste expirou.");
                        });

                        unsubActs = window.fb.onSnapshot(actRef, (snapshot) => {
                            if (!isMounted) return;
                            const loadedActs = [];
                            snapshot.forEach((doc) => loadedActs.push({ ...doc.data(), dbId: doc.id }));
                            setActivities(loadedActs);
                        }, (error) => {
                            console.error(error);
                        });

                        if (isMounted) setIsFirebaseLoaded(true);
                    } catch (e) {
                        console.error(e);
                        if (isMounted) setDbError("Erro ao puxar dados da nuvem.");
                    }
                };

                if (window.db) {
                    startDatabase();
                } else {
                    window.addEventListener('firebase-ready', startDatabase);
                }

                // Alerta caso a internet esteja muito lenta
                const timer = setTimeout(() => {
                    if (!isFirebaseLoaded && isMounted) {
                        setLoadingMessage("A conexão está lenta. Verifique o sinal da sua internet...");
                    }
                }, 8000);

                return () => {
                    isMounted = false;
                    clearTimeout(timer);
                    if (unsubUsers) unsubUsers();
                    if (unsubActs) unsubActs();
                    window.removeEventListener('firebase-ready', startDatabase);
                };
            }, []);

            if (dbError) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-red-700 bg-red-50 p-6 text-center font-sans">
                        <i className="fas fa-database fa-3x mb-4 text-red-500"></i>
                        <h2 className="text-2xl font-black mb-2">Conexão Bloqueada!</h2>
                        <p className="font-bold text-lg mb-4">{dbError}</p>
                        <div className="bg-white p-6 rounded-2xl shadow-lg border-2 border-red-200 max-w-lg text-sm text-gray-700 font-medium">
                            <p className="mb-3 text-red-600 font-bold">Fique calmo! Seus dados estão salvos e seguros. Isso é apenas uma trava de segurança do Google (Firebase) após 30 dias.</p>
                            <p className="font-black text-gray-900 border-b pb-2 mb-2">Como liberar os dados agora:</p>
                            <ol className="text-left list-decimal ml-5 space-y-2">
                                <li>Acesse o <strong>Firebase Console</strong></li>
                                <li>Vá em <strong>Firestore Database</strong> e clique em <strong>Regras (Rules)</strong>.</li>
                                <li>Substitua por: <code className="bg-gray-100 px-2 py-1 rounded text-red-600 font-bold block mt-1 border">allow read, write: if true;</code></li>
                                <li>Clique em <strong>Publicar</strong> e atualize a página.</li>
                            </ol>
                        </div>
                    </div>
                );
            }

            if (!isFirebaseLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-[#003b49] bg-yellow-50">
                        <i className="fas fa-circle-notch fa-spin fa-3x mb-4"></i>
                        <h2 className="text-xl font-bold">{loadingMessage}</h2>
                    </div>
                );
            }

            const handleLogin = (userType, user) => {
                setCurrentUser(user);
                setCurrentView(userType);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentView('login');
            };

            // Roteamento
            if (currentView === 'login') return <LoginScreen onLogin={handleLogin} onRegister={() => setCurrentView('register')} users={users} />;
            if (currentView === 'register') return <RegisterScreen onCancel={() => setCurrentView('login')} users={users} />;
            if (currentView === 'user') return <UserDashboard user={currentUser} onLogout={handleLogout} activities={activities} />;
            if (currentView === 'admin') return <AdminDashboard onLogout={handleLogout} users={users} activities={activities} />;

            return null;
        }

        /* --- TELA DE LOGIN --- */
        function LoginScreen({ onLogin, onRegister, users }) {
            const [mode, setMode] = useState('user'); 
            const [identifier, setIdentifier] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const isRegistrationClosed = new Date() > DEADLINE;

            const handleUserLogin = (e) => {
                e.preventDefault();
                const user = users.find(u => u.registro === identifier || u.documento === identifier);
                if (user) onLogin('user', user);
                else setError('Registro ou CPF não encontrado. Verifique os dados.');
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (email === 'bibliotecaderemanso@gmail.com' && password === 'Rso.redes.2026#') {
                    onLogin('admin', { role: 'admin', name: 'Administração' });
                } else {
                    setError('Credenciais de administrador inválidas.');
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-net font-sans text-gray-800">
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-yellow-300">
                        <div className="p-8 bg-[#003b49] text-white flex flex-col items-center">
                            <img src="Redes literárias_Biblioteca (1).png" alt="Redes Literárias" className="w-36 h-36 object-contain bg-white rounded-full p-2 mb-4 shadow-lg border-4 border-[#f8b417]" />
                            <h1 className="text-2xl font-black text-center tracking-wide">Desafio Redes Literárias</h1>
                            <p className="text-yellow-400 text-sm font-semibold mt-1">Biblioteca Municipal Délio Ledoux</p>
                        </div>
                        
                        <div className="flex border-b bg-gray-50">
                            <button className={`flex-1 py-4 font-bold text-sm ${mode === 'user' ? 'text-[#003b49] border-b-4 border-[#003b49] bg-white' : 'text-gray-400'}`} onClick={() => { setMode('user'); setError(''); }}><i className="fas fa-book-reader mr-2"></i> Sou Leitor</button>
                            <button className={`flex-1 py-4 font-bold text-sm ${mode === 'admin' ? 'text-[#003b49] border-b-4 border-[#003b49] bg-white' : 'text-gray-400'}`} onClick={() => { setMode('admin'); setError(''); }}><i className="fas fa-shield-alt mr-2"></i> Admin</button>
                        </div>

                        <div className="p-8">
                            {error && <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-bold rounded-r-lg"><i className="fas fa-exclamation-circle mr-2"></i>{error}</div>}
                            
                            {mode === 'user' ? (
                                <form onSubmit={handleUserLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Registro ou CPF</label>
                                        <input type="text" value={identifier} onChange={(e) => setIdentifier(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-0 focus:border-[#003b49] outline-none font-medium bg-gray-50" placeholder="Ex: RSO-123456 ou CPF" required />
                                    </div>
                                    <button type="submit" className="w-full bg-[#003b49] text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-gray-800 transition">Entrar no Painel</button>
                                    <div className="text-center pt-6 mt-4 border-t">
                                        {isRegistrationClosed ? (
                                            <div className="p-4 bg-red-50 text-red-700 rounded-xl font-bold shadow-inner border border-red-200"><i className="fas fa-lock mr-2"></i> Inscrições encerradas</div>
                                        ) : (
                                            <button type="button" onClick={onRegister} className="w-full bg-[#f8b417] text-[#003b49] py-4 rounded-xl font-black hover:bg-yellow-400 shadow-md">Fazer Inscrição Agora</button>
                                        )}
                                    </div>
                                </form>
                            ) : (
                                <form onSubmit={handleAdminLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">E-mail Administrativo</label>
                                        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none font-medium bg-gray-50" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Senha Segura</label>
                                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none font-medium bg-gray-50" required />
                                    </div>
                                    <button type="submit" className="w-full bg-[#003b49] text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-gray-800 transition">Acessar Sistema</button>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        /* --- TELA DE REGISTRO --- */
        function RegisterScreen({ onCancel, users }) {
            const isRegistrationClosed = new Date() > DEADLINE;

            if (isRegistrationClosed) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full text-center border-4 border-red-500">
                            <i className="fas fa-lock fa-4x text-red-500 mb-6"></i>
                            <h2 className="text-3xl font-black text-gray-800 mb-4">Inscrições Encerradas</h2>
                            <p className="text-gray-600 font-bold mb-8">O prazo oficial para novas inscrições encerrou.</p>
                            <button onClick={onCancel} className="w-full bg-[#003b49] text-white px-6 py-4 rounded-xl font-black hover:bg-gray-800 transition">Voltar ao Início</button>
                        </div>
                    </div>
                );
            }

            const [formData, setFormData] = useState({ nome: '', documento: '', nascimento: '', endereco: '', telefone: '', nomeResponsavel: '', docResponsavel: '', telefoneResponsavel: '' });
            const [selfieUrl, setSelfieUrl] = useState(null);
            const [age, setAge] = useState(null);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [successMsg, setSuccessMsg] = useState(false);
            const [regNumber, setRegNumber] = useState('');

            const calculateAge = (dobString) => {
                if (!dobString) return null;
                const dob = new Date(dobString);
                const today = new Date();
                let calcAge = today.getFullYear() - dob.getFullYear();
                const m = today.getMonth() - dob.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) calcAge--;
                return calcAge;
            };

            const handleDateChange = (e) => {
                const d = e.target.value;
                setFormData({ ...formData, nascimento: d });
                const calcAge = calculateAge(d);
                setAge(calcAge);
                if (calcAge !== null && calcAge < 11) setError('É necessário ter pelo menos 11 anos para participar.');
                else setError('');
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setSelfieUrl(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (age < 11) { setError('Idade mínima não atingida.'); return; }
                if (!selfieUrl) { setError('Adicione uma foto (selfie ou arquivo) para a sua carteirinha.'); return; }
                
                const exists = users.find(u => u.documento.replace(/\D/g, '') === formData.documento.replace(/\D/g, '') || u.nome.trim().toLowerCase() === formData.nome.trim().toLowerCase());
                if (exists) { setError('Atenção: Já existe um leitor cadastrado com este Nome ou CPF.'); return; }

                setLoading(true);
                const registro = Math.floor(100000 + Math.random() * 900000).toString();
                const num = `RSO-${registro}`;
                
                const newUser = { ...formData, id: Date.now().toString(), registro: num, foto: selfieUrl, idade: age, createdAt: new Date().toISOString() };

                try {
                    await window.fb.addDoc(window.fb.collection(window.db, "users"), newUser);
                    setRegNumber(num);
                    setSuccessMsg(true);
                } catch (err) {
                    setError("Erro ao conectar à nuvem. Verifique a internet e tente novamente.");
                }
                setLoading(false);
            };

            if (successMsg) {
                return (
                    <div className="min-h-screen bg-green-50 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2rem] shadow-xl max-w-md w-full text-center border-4 border-green-500">
                            <i className="fas fa-check-circle fa-4x text-green-500 mb-6"></i>
                            <h2 className="text-3xl font-black text-gray-800 mb-4">Inscrição Concluída!</h2>
                            <p className="text-gray-600 font-medium mb-4">Seu número de registro oficial é:</p>
                            <div className="bg-gray-100 p-4 rounded-xl text-3xl font-black text-[#003b49] mb-8">{regNumber}</div>
                            <button onClick={onCancel} className="w-full bg-[#003b49] text-white px-6 py-4 rounded-xl font-black hover:bg-gray-800 transition shadow-lg">Ir para o Login</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 p-4 py-8 font-sans text-gray-800">
                    <div className="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-6 md:p-10 border-t-8 border-[#f8b417]">
                        <button onClick={onCancel} className="text-gray-500 hover:text-[#003b49] mb-6 flex items-center font-bold transition"><i className="fas fa-arrow-left mr-2"></i> Voltar ao Login</button>
                        <h2 className="text-3xl font-black text-[#003b49] mb-2">Cadastro de Leitor</h2>
                        <p className="text-gray-500 font-medium mb-8">Preencha com atenção. Seus dados gerarão sua carteirinha.</p>
                        
                        {error && <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 font-bold flex items-start"><i className="fas fa-exclamation-triangle mt-1 mr-3"></i><p>{error}</p></div>}

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-300 rounded-2xl bg-gray-50">
                                {selfieUrl ? (
                                    <img src={selfieUrl} alt="Selfie" className="w-32 h-32 rounded-full object-cover border-4 border-[#f8b417] shadow-md" />
                                ) : (
                                    <div className="w-32 h-32 rounded-full bg-white border-4 border-gray-200 flex items-center justify-center text-gray-400 shadow-inner"><i className="fas fa-camera text-4xl"></i></div>
                                )}
                                <div className="mt-6 flex gap-3">
                                    <label className="cursor-pointer bg-[#003b49] text-white px-4 py-3 rounded-xl text-sm font-bold hover:bg-gray-800 transition shadow-md flex items-center"><i className="fas fa-camera mr-2"></i> Tirar Foto<input type="file" accept="image/*" capture="user" className="hidden" onChange={handleImageUpload} /></label>
                                    <label className="cursor-pointer bg-gray-200 text-gray-700 px-4 py-3 rounded-xl text-sm font-bold hover:bg-gray-300 transition shadow-md flex items-center"><i className="fas fa-upload mr-2"></i> Anexar<input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} /></label>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div className="md:col-span-2"><label className="block text-sm font-bold mb-2">Nome Completo</label><input type="text" required value={formData.nome} onChange={e => setFormData({...formData, nome: e.target.value})} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none" /></div>
                                <div><label className="block text-sm font-bold mb-2">Nascimento</label><input type="date" required value={formData.nascimento} onChange={handleDateChange} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none" /></div>
                                <div><label className="block text-sm font-bold mb-2">CPF</label><input type="text" required value={formData.documento} onChange={e => setFormData({...formData, documento: e.target.value})} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none" /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-bold mb-2">Endereço Completo</label><input type="text" required value={formData.endereco} onChange={e => setFormData({...formData, endereco: e.target.value})} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none" /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-bold mb-2">Telefone/WhatsApp</label><input type="text" required value={formData.telefone} onChange={e => setFormData({...formData, telefone: e.target.value})} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#003b49] outline-none" /></div>
                            </div>

                            {age !== null && age >= 11 && age < 18 && (
                                <div className="p-6 bg-yellow-50 border-2 border-yellow-300 rounded-2xl space-y-5">
                                    <h3 className="font-black text-yellow-800 flex items-center text-lg"><i className="fas fa-shield-alt mr-2"></i> Dados do Responsável (Obrigatório)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="md:col-span-2"><label className="block text-sm font-bold mb-2">Nome do Responsável</label><input type="text" required value={formData.nomeResponsavel} onChange={e => setFormData({...formData, nomeResponsavel: e.target.value})} className="w-full p-4 border-2 rounded-xl" /></div>
                                        <div><label className="block text-sm font-bold mb-2">CPF Responsável</label><input type="text" required value={formData.docResponsavel} onChange={e => setFormData({...formData, docResponsavel: e.target.value})} className="w-full p-4 border-2 rounded-xl" /></div>
                                        <div><label className="block text-sm font-bold mb-2">Contato Responsável</label><input type="text" required value={formData.telefoneResponsavel} onChange={e => setFormData({...formData, telefoneResponsavel: e.target.value})} className="w-full p-4 border-2 rounded-xl" /></div>
                                    </div>
                                </div>
                            )}

                            <button type="submit" disabled={age !== null && age < 11 || loading} className={`w-full py-5 rounded-2xl font-black text-xl text-white transition shadow-lg mt-8 ${age !== null && age < 11 ? 'bg-gray-400 cursor-not-allowed' : 'bg-[#f8b417] hover:bg-yellow-500 text-[#003b49]'}`}>
                                {loading ? <i className="fas fa-spinner fa-spin"></i> : 'Concluir Cadastro'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        /* --- PAINEL DO LEITOR --- */
        function UserDashboard({ user, onLogout, activities }) {
            const [activeTab, setActiveTab] = useState('perfil'); 
            const [bookData, setBookData] = useState({ title: '', author: '', year: '' });
            const [rating, setRating] = useState(0);
            const [message, setMessage] = useState({ text: '', type: '' });
            const [loadingLocation, setLoadingLocation] = useState(false);
            const cardRef = useRef(null);

            const userActivities = activities.filter(a => a.userId === user.id);
            // SOMA DE PONTOS A PROVA DE FALHAS (Garante que tudo seja número)
            const totalPoints = userActivities.reduce((sum, act) => sum + (Number(act.points) || 0), 0);

            const showMsg = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 4000);
            };

            const downloadCard = () => {
                if (cardRef.current) {
                    html2canvas(cardRef.current, { scale: 2, useCORS: true }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Carteirinha_${user.nome}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    });
                }
            };

            const handleRegisterBook = async (e) => {
                e.preventDefault();
                if(!bookData.title) return;
                const newActivity = { userId: user.id, type: 'book', ...bookData, status: 'Lendo', date: new Date().toISOString().split('T')[0], points: 0 };
                await window.fb.addDoc(window.fb.collection(window.db, "activities"), newActivity);
                setBookData({ title: '', author: '', year: '' });
                showMsg('📚 Livro cadastrado! Boa leitura!');
                setActiveTab('perfil');
            };

            const markAsRead = async (book) => {
                if (rating === 0) { showMsg('Dê uma nota de 1 a 5 estrelas antes de concluir.', 'error'); return; }
                const actRef = window.fb.doc(window.db, "activities", book.dbId);
                await window.fb.updateDoc(actRef, { status: 'Lido', rating: rating, points: 10 });
                setRating(0);
                showMsg('Parabéns! Você concluiu uma leitura! +10 pontos 🌟');
            };

            // AGENDAMENTO DIRETO NA ABA (Fácil e Seguro)
            const handleScheduleRequest = async (bookId) => {
                if (!confirm("Atenção: O resumo presencial é escrito na Biblioteca sem consulta. Deseja pedir aprovação?")) return;
                const actRef = window.fb.doc(window.db, "activities", bookId);
                await window.fb.updateDoc(actRef, { status: 'Resumo Agendado' });
                showMsg('Pedido enviado! Aguarde o Administrador aprovar sua vinda.');
                setActiveTab('perfil');
            };

            const handleCheckIn = () => {
                setLoadingLocation(true);
                if(navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        // Distância Biblioteca de Remanso
                        const R = 6371; const dLat = (-9.62-pos.coords.latitude)*(Math.PI/180); const dLon = (-42.08-pos.coords.longitude)*(Math.PI/180);
                        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(pos.coords.latitude*(Math.PI/180))*Math.cos(-9.62*(Math.PI/180))*Math.sin(dLon/2)*Math.sin(dLon/2);
                        const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

                        if (dist <= 1.0) { 
                            const newCheckin = { userId: user.id, type: 'checkin', checkinTime: new Date().toISOString(), status: 'active', points: 0 };
                            await window.fb.addDoc(window.fb.collection(window.db, "activities"), newCheckin);
                            showMsg('Check-in realizado! Boa leitura na biblioteca.');
                        } else {
                            showMsg('Você precisa estar próximo à Biblioteca para o check-in.', 'error');
                        }
                        setLoadingLocation(false);
                    }, () => { showMsg('Ative o GPS para o check-in.', 'error'); setLoadingLocation(false); });
                }
            };

            const handleCheckOut = async (checkinRecord) => {
                const outTime = new Date();
                const inTime = new Date(checkinRecord.checkinTime);
                const diffMins = Math.round((outTime - inTime) / 60000);
                
                let pts = 0;
                if (diffMins >= 60) pts = 3 + Math.floor((diffMins - 60) / 20) * 1;
                else if (diffMins >= 40) pts = 2;
                else if (diffMins >= 30) pts = 1;
                else if (diffMins >= 20) pts = 0.5;

                const actRef = window.fb.doc(window.db, "activities", checkinRecord.dbId);
                await window.fb.updateDoc(actRef, { type: 'checkin_out', checkoutTime: outTime.toISOString(), durationMins: diffMins, points: pts, status: 'completed' });
                showMsg(`Check-out! Tempo: ${diffMins} min. Pontos: ${pts}.`);
            };

            const activeCheckin = userActivities.find(a => a.type === 'checkin' && a.status === 'active');
            const books = userActivities.filter(a => a.type === 'book');

            return (
                <div className="min-h-screen bg-gray-100 pb-10 font-sans text-gray-800">
                    <header className="bg-[#003b49] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="Redes literárias_Biblioteca (1).png" alt="Logo" className="w-12 h-12 bg-white rounded-full p-1 border-2 border-yellow-400" />
                                <div><h1 className="font-bold text-lg leading-tight">Redes Literárias</h1><p className="text-yellow-400 text-sm">Painel do Leitor</p></div>
                            </div>
                            <button onClick={onLogout} className="text-sm font-bold bg-white text-[#003b49] px-4 py-2 rounded-lg hover:bg-gray-200"><i className="fas fa-sign-out-alt mr-1"></i> Sair</button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-6 px-4">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="md:col-span-1 space-y-6">
                                <div ref={cardRef} className="bg-gradient-to-b from-[#003b49] to-gray-900 rounded-3xl shadow-xl overflow-hidden relative border-4 border-white">
                                    <div className="bg-[#f8b417] h-24 w-full absolute top-0 left-0 z-0 rounded-b-[50px] shadow-md"></div>
                                    <div className="relative z-10 p-6 flex flex-col items-center pt-8">
                                        <img src={user.foto} className="w-28 h-28 rounded-full border-4 border-white shadow-xl object-cover bg-gray-100" />
                                        <h2 className="mt-4 font-black text-xl text-center text-white leading-tight uppercase">{user.nome}</h2>
                                        <div className="bg-white text-[#003b49] px-4 py-1.5 rounded-full text-sm font-black mt-3 shadow-md tracking-widest">{user.registro}</div>
                                        <div className="w-full mt-6 bg-white/10 rounded-xl p-4 text-center border border-white/20">
                                            <p className="text-gray-300 text-xs font-bold uppercase tracking-wide mb-1">Pontuação Total</p>
                                            <p className="font-black text-3xl text-yellow-400">{totalPoints} <span className="text-sm">pts</span></p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={downloadCard} className="w-full bg-white border-2 border-[#003b49] text-[#003b49] font-bold py-3 rounded-xl hover:bg-gray-50 transition shadow-sm"><i className="fas fa-download mr-2"></i> Baixar Carteirinha</button>
                            </div>

                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm p-2 flex gap-1 overflow-x-auto hide-scrollbar border border-gray-200">
                                    <button onClick={() => setActiveTab('perfil')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm whitespace-nowrap transition ${activeTab === 'perfil' ? 'bg-[#003b49] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-history mr-2"></i> Histórico</button>
                                    <button onClick={() => setActiveTab('livro')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm whitespace-nowrap transition ${activeTab === 'livro' ? 'bg-[#003b49] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-book-open mr-2"></i> Cadastrar Livro</button>
                                    <button onClick={() => setActiveTab('resumo')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm whitespace-nowrap transition ${activeTab === 'resumo' ? 'bg-[#f8b417] text-[#003b49]' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-edit mr-2"></i> Agendar Resumo</button>
                                    <button onClick={() => setActiveTab('checkin')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm whitespace-nowrap transition ${activeTab === 'checkin' ? 'bg-[#003b49] text-white' : 'text-gray-500 hover:bg-gray-100'}`}><i className="fas fa-map-marker-alt mr-2"></i> Check-in</button>
                                </div>

                                {message.text && <div className={`p-4 rounded-xl font-bold shadow-sm border-l-4 ${message.type === 'success' ? 'bg-green-50 text-green-700 border-green-500' : 'bg-red-50 text-red-700 border-red-500'}`}><i className={`fas ${message.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2`}></i> {message.text}</div>}

                                {activeTab === 'perfil' && (
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200">
                                        <h3 className="font-black text-xl text-[#003b49] mb-6"><i className="fas fa-stream mr-3"></i> Suas Atividades</h3>
                                        <div className="space-y-4">
                                            {books.map(b => (
                                                <div key={b.dbId} className="border-2 border-gray-100 rounded-xl p-4">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <h4 className="font-bold text-lg text-gray-800">{b.title}</h4>
                                                            <p className="text-sm text-gray-500">{b.author} • {b.year}</p>
                                                            <div className="mt-2 inline-flex items-center text-xs font-bold px-3 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-200">Status: {b.status}</div>
                                                            {b.rating && <div className="mt-2 text-yellow-400 text-sm">{"★".repeat(b.rating)}{"☆".repeat(5-b.rating)}</div>}
                                                        </div>
                                                        <div className="text-right">
                                                            {b.status === 'Lendo' && (
                                                                <div className="flex flex-col items-end gap-2">
                                                                    <div className="flex gap-1 text-2xl text-gray-300">
                                                                        {[1,2,3,4,5].map(star => <i key={star} onClick={() => setRating(star)} className={`fas fa-star cursor-pointer hover:text-yellow-400 ${rating >= star ? 'text-yellow-400' : ''}`}></i>)}
                                                                    </div>
                                                                    <button onClick={() => markAsRead(b)} className="bg-green-500 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-green-600">Marcar como Lido</button>
                                                                </div>
                                                            )}
                                                            {b.status === 'Lido' && <button onClick={() => setActiveTab('resumo')} className="bg-[#f8b417] text-[#003b49] text-xs font-bold px-3 py-2 rounded-lg hover:bg-yellow-500 mt-2">Agendar Resumo</button>}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {userActivities.filter(a => a.type !== 'book').map(act => (
                                                <div key={act.dbId} className="border border-gray-100 rounded-xl p-4 bg-gray-50 flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold text-gray-700">{act.type === 'checkin_out' ? 'Estudo na Biblioteca' : act.title || act.type}</p>
                                                        <p className="text-xs text-gray-500">{new Date(act.checkoutTime || act.date || act.createdAt).toLocaleDateString('pt-BR')}</p>
                                                    </div>
                                                    <span className={`font-black px-3 py-1 rounded-lg ${act.points < 0 ? 'text-red-600 bg-red-100' : 'text-green-600 bg-green-100'}`}>{act.points > 0 ? '+' : ''}{act.points} pts</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'livro' && (
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200">
                                        <h3 className="font-black text-xl text-[#003b49] mb-2"><i className="fas fa-plus-circle mr-2"></i> Iniciar Leitura</h3>
                                        <form onSubmit={handleRegisterBook} className="space-y-5">
                                            <div><label className="block text-sm font-bold mb-2">Título da Obra</label><input type="text" required value={bookData.title} onChange={e => setBookData({...bookData, title: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50 outline-none" /></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-sm font-bold mb-2">Autor</label><input type="text" required value={bookData.author} onChange={e => setBookData({...bookData, author: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50" /></div>
                                                <div><label className="block text-sm font-bold mb-2">Ano</label><input type="text" value={bookData.year} onChange={e => setBookData({...bookData, year: e.target.value})} className="w-full p-4 border-2 rounded-xl bg-gray-50" /></div>
                                            </div>
                                            <button type="submit" className="w-full bg-[#003b49] text-white font-black py-4 rounded-xl hover:bg-gray-800 transition">Salvar Leitura</button>
                                        </form>
                                    </div>
                                )}

                                {activeTab === 'resumo' && (
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200">
                                        <h3 className="font-black text-xl text-[#003b49] mb-4"><i className="fas fa-calendar-check mr-2"></i> Agendamento de Resumo</h3>
                                        <div className="bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-xl mb-6 text-orange-800 text-sm">
                                            <strong>AVISO OFICIAL:</strong> O resumo é escrito presencialmente, sem consulta, na Biblioteca Municipal Dr. Délio Ledoux.<br/>
                                            <strong>Dias:</strong> Terça a Quinta.<br/><strong>Horário:</strong> das 9h às 17:30h.<br/>
                                            Clique no botão abaixo para avisar o Administrador que você deseja fazer um resumo.
                                        </div>
                                        {books.filter(b => b.status === 'Lido').map(b => (
                                            <div key={b.dbId} className="flex justify-between items-center p-4 border-2 border-gray-100 rounded-xl mb-3">
                                                <p className="font-bold text-gray-800">{b.title}</p>
                                                <button onClick={() => handleScheduleRequest(b.dbId)} className="bg-[#f8b417] text-[#003b49] font-black px-4 py-2 rounded-lg hover:bg-yellow-500 shadow-md">Pedir Agendamento</button>
                                            </div>
                                        ))}
                                        {books.filter(b => b.status === 'Lido').length === 0 && <p className="text-gray-500 text-center font-bold">Você não tem livros com status 'Lido' para agendar.</p>}
                                    </div>
                                )}

                                {activeTab === 'checkin' && (
                                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 text-center">
                                        <h3 className="font-black text-xl text-[#003b49] mb-4">Check-in na Biblioteca</h3>
                                        {!activeCheckin ? (
                                            <button onClick={handleCheckIn} disabled={loadingLocation} className="bg-[#003b49] text-white w-48 h-48 rounded-full shadow-2xl font-black text-2xl hover:scale-105 transition flex flex-col items-center justify-center mx-auto border-8 border-blue-100">
                                                {loadingLocation ? <i className="fas fa-spinner fa-spin mb-2"></i> : <i className="fas fa-map-marker-alt mb-2 text-[#f8b417] text-4xl"></i>}
                                                Fazer Check-in
                                            </button>
                                        ) : (
                                            <div className="bg-green-50 p-8 rounded-3xl border-2 border-green-200">
                                                <i className="fas fa-clock fa-3x text-green-500 mb-4 animate-pulse"></i>
                                                <h4 className="font-black text-xl text-green-800 mb-2">Tempo Contando...</h4>
                                                <p className="text-green-700 font-medium mb-6">Entrada: {new Date(activeCheckin.checkinTime).toLocaleTimeString('pt-BR')}</p>
                                                <button onClick={() => handleCheckOut(activeCheckin)} className="bg-red-600 text-white font-black py-4 px-10 rounded-xl shadow-lg hover:bg-red-700">Fazer Check-out</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        /* --- PAINEL DO ADMINISTRADOR --- */
        function AdminDashboard({ onLogout, users, activities }) {
            const [activeTab, setActiveTab] = useState('resumos'); 
            const [message, setMessage] = useState({ text: '', type: '' });
            const [infracaoData, setInfracaoData] = useState({ userId: '', motivo: '', pontos: '' });
            const [eventData, setEventData] = useState({ userId: '', nome: '' });

            const showMsg = (text, type = 'success') => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 4000);
            };

            const pendingBooks = activities.filter(a => a.status === 'Resumo Agendado');
            const allBooks = activities.filter(a => a.type === 'book');
            const getUserInfo = (id) => users.find(u => u.id === id);
            
            const handleApproveSummary = async (bookId) => {
                const actRef = window.fb.doc(window.db, "activities", bookId);
                await window.fb.updateDoc(actRef, { status: 'Resumo Aprovado', points: 50 });
                showMsg('Resumo Aprovado! +50 pontos.');
            };

            const handleInfracao = async (e) => {
                e.preventDefault();
                const user = users.find(u => u.registro === infracaoData.userId);
                if (!user) { showMsg('Leitor não encontrado', 'error'); return; }
                const newInf = { userId: user.id, type: 'infracao', title: `Infração: ${infracaoData.motivo}`, points: -Math.abs(infracaoData.pontos), date: new Date().toISOString() };
                await window.fb.addDoc(window.fb.collection(window.db, "activities"), newInf);
                setInfracaoData({ userId: '', motivo: '', pontos: '' });
                showMsg('Infração aplicada.', 'error');
            };

            const handleEvent = async (e) => {
                e.preventDefault();
                const user = users.find(u => u.registro === eventData.userId);
                if (!user) { showMsg('Leitor não encontrado', 'error'); return; }
                const newEvt = { userId: user.id, type: 'event', title: `Evento: ${eventData.nome}`, points: 30, date: new Date().toISOString() };
                await window.fb.addDoc(window.fb.collection(window.db, "activities"), newEvt);
                setEventData({ userId: '', nome: '' });
                showMsg('Participação em evento registrada! +30 pts.');
            };

            const handleDeleteUser = async (user) => {
                if (confirm(`Tem certeza que deseja EXCLUIR DEFINITIVAMENTE o leitor ${user.nome}?`)) {
                    await window.fb.deleteDoc(window.fb.doc(window.db, "users", user.dbId));
                    showMsg('Usuário excluído.');
                }
            };

            const exportExcel = () => {
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(users), "Leitores_Inscritos");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allBooks), "Livros_e_Resumos");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(activities.filter(a => a.type === 'checkin_out')), "Horas_na_Biblioteca");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(activities.filter(a => a.type === 'event')), "Eventos");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(activities.filter(a => a.type === 'infracao')), "Infracoes");
                
                const ranking = users.map(user => {
                    const pts = activities.filter(a => a.userId === user.id).reduce((sum, a) => sum + (Number(a.points) || 0), 0);
                    return { Nome: user.nome, Registro: user.registro, Idade: user.idade, Pontos: pts };
                }).sort((a, b) => b.Pontos - a.Pontos);
                
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ranking), "Ranking_Geral");
                XLSX.writeFile(wb, "Backup_Redes_Literarias.xlsx");
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-10 font-sans text-gray-800">
                    <header className="bg-gray-900 text-white p-4 shadow-md sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-[#f8b417] rounded-full flex items-center justify-center text-gray-900 font-black"><i className="fas fa-shield-alt"></i></div>
                                <div><h1 className="font-bold text-lg leading-tight">Painel Administrativo</h1><p className="text-gray-400 text-sm">Controle Total</p></div>
                            </div>
                            <button onClick={onLogout} className="text-sm text-gray-400 hover:text-white font-bold"><i className="fas fa-power-off mr-1"></i> Sair</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4">
                        <div className="flex flex-wrap bg-white rounded-2xl shadow-sm mb-6 overflow-hidden border border-gray-200">
                            <button onClick={() => setActiveTab('resumos')} className={`flex-1 py-4 px-4 font-black text-sm border-r border-gray-100 ${activeTab === 'resumos' ? 'bg-[#003b49] text-white' : 'text-gray-600 hover:bg-gray-50'}`}><i className="fas fa-check-double mr-2"></i> Validar Resumos</button>
                            <button onClick={() => setActiveTab('status')} className={`flex-1 py-4 px-4 font-black text-sm border-r border-gray-100 ${activeTab === 'status' ? 'bg-[#003b49] text-white' : 'text-gray-600 hover:bg-gray-50'}`}><i className="fas fa-book mr-2"></i> Status Leituras</button>
                            <button onClick={() => setActiveTab('leitores')} className={`flex-1 py-4 px-4 font-black text-sm border-r border-gray-100 ${activeTab === 'leitores' ? 'bg-[#003b49] text-white' : 'text-gray-600 hover:bg-gray-50'}`}><i className="fas fa-users mr-2"></i> Gestão Admin</button>
                            <button onClick={exportExcel} className="flex-1 py-4 px-4 font-black text-sm bg-green-600 text-white hover:bg-green-700 transition"><i className="fas fa-file-excel mr-2"></i> Exportar Dados</button>
                        </div>

                        {message.text && <div className={`p-4 rounded-xl font-bold mb-6 border-l-4 ${message.type === 'success' ? 'bg-green-50 text-green-700 border-green-500' : 'bg-red-50 text-red-700 border-red-500'}`}><i className="fas fa-info-circle mr-2"></i> {message.text}</div>}

                        <div className="bg-white rounded-2xl shadow-sm p-8 border border-gray-200">
                            {activeTab === 'resumos' && (
                                <div>
                                    <h2 className="text-2xl font-black text-[#003b49] mb-6">Aprovação de Resumos</h2>
                                    {pendingBooks.map(act => {
                                        const u = getUserInfo(act.userId);
                                        if(!u) return null;
                                        return (
                                            <div key={act.dbId} className="flex justify-between items-center p-5 border-2 border-gray-100 rounded-2xl bg-gray-50 mb-3">
                                                <div className="flex items-center gap-4">
                                                    <img src={u.foto} className="w-14 h-14 rounded-full border-2 border-[#003b49]" />
                                                    <div>
                                                        <p className="font-black text-lg">{u.nome}</p>
                                                        <p className="text-sm font-bold text-gray-600">Reg: {u.registro} | Livro: <span className="text-[#003b49]">{act.title}</span></p>
                                                    </div>
                                                </div>
                                                <button onClick={() => handleApproveSummary(act.dbId)} className="bg-green-600 text-white px-6 py-3 rounded-xl font-black hover:bg-green-700 transition"><i className="fas fa-check-circle mr-2"></i> Confirmar Presença e Dar Pontos</button>
                                            </div>
                                        )
                                    })}
                                    {pendingBooks.length === 0 && <p className="text-center font-bold text-gray-500 py-10">Nenhum resumo aguardando.</p>}
                                </div>
                            )}

                            {activeTab === 'status' && (
                                <div>
                                    <h2 className="text-2xl font-black text-[#003b49] mb-6">Visão Geral de Todas as Leituras</h2>
                                    <div className="overflow-x-auto rounded-xl border border-gray-200">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="bg-gray-100 border-b border-gray-200 text-gray-700">
                                                <tr><th className="p-4 font-black">Obra</th><th className="p-4 font-black">Leitor (Reg)</th><th className="p-4 font-black">Status Atual</th></tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {allBooks.map(b => {
                                                    const u = getUserInfo(b.userId);
                                                    return (
                                                        <tr key={b.dbId} className="border-b hover:bg-gray-50">
                                                            <td className="p-4 font-bold text-gray-800">{b.title} <span className="text-xs text-gray-500 font-normal block">{b.author}</span></td>
                                                            <td className="p-4">{u?.nome} <span className="text-xs text-gray-500 block">{u?.registro}</span></td>
                                                            <td className="p-4"><span className={`px-3 py-1 rounded-full text-xs font-black ${b.status === 'Lendo' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}`}>{b.status}</span></td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'leitores' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="md:col-span-1 space-y-6">
                                        <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                                            <h3 className="font-black text-red-600 mb-4"><i className="fas fa-gavel mr-2"></i> Aplicar Infração</h3>
                                            <form onSubmit={handleInfracao} className="space-y-4">
                                                <div><label className="block text-xs font-bold mb-1">Registro do Leitor</label><input type="text" required value={infracaoData.userId} onChange={e => setInfracaoData({...infracaoData, userId: e.target.value})} className="w-full p-3 rounded-lg border outline-none" placeholder="Ex: RSO-123456" /></div>
                                                <div><label className="block text-xs font-bold mb-1">Motivo</label><input type="text" required value={infracaoData.motivo} onChange={e => setInfracaoData({...infracaoData, motivo: e.target.value})} className="w-full p-3 rounded-lg border outline-none" /></div>
                                                <div><label className="block text-xs font-bold mb-1">Pontos a Descontar</label><input type="number" required value={infracaoData.pontos} onChange={e => setInfracaoData({...infracaoData, pontos: e.target.value})} className="w-full p-3 rounded-lg border outline-none" placeholder="Ex: 20" /></div>
                                                <button type="submit" className="w-full bg-red-600 text-white font-black py-3 rounded-lg hover:bg-red-700"><i className="fas fa-minus-circle mr-2"></i> Descontar</button>
                                            </form>
                                        </div>
                                        <div className="bg-blue-50 p-6 rounded-2xl border border-blue-200">
                                            <h3 className="font-black text-blue-800 mb-4"><i className="fas fa-star mr-2"></i> Registrar Evento</h3>
                                            <form onSubmit={handleEvent} className="space-y-4">
                                                <div><label className="block text-xs font-bold mb-1 text-blue-800">Registro do Leitor</label><input type="text" required value={eventData.userId} onChange={e => setEventData({...eventData, userId: e.target.value})} className="w-full p-3 rounded-lg border outline-none" /></div>
                                                <div><label className="block text-xs font-bold mb-1 text-blue-800">Nome do Evento</label><input type="text" required value={eventData.nome} onChange={e => setEventData({...eventData, nome: e.target.value})} className="w-full p-3 rounded-lg border outline-none" /></div>
                                                <button type="submit" className="w-full bg-blue-600 text-white font-black py-3 rounded-lg hover:bg-blue-700"><i className="fas fa-plus-circle mr-2"></i> Dar Pontos (+30)</button>
                                            </form>
                                        </div>
                                    </div>
                                    <div className="md:col-span-2">
                                        <h3 className="font-black text-[#003b49] mb-4"><i className="fas fa-users-cog mr-2"></i> Base de Leitores Inscritos</h3>
                                        <div className="overflow-x-auto rounded-xl border border-gray-200 h-96 overflow-y-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-gray-100 border-b border-gray-200 text-gray-700 sticky top-0">
                                                    <tr><th className="p-3 font-black text-sm">Leitor</th><th className="p-3 font-black text-sm text-right">Ação</th></tr>
                                                </thead>
                                                <tbody className="text-sm">
                                                    {users.map(u => (
                                                        <tr key={u.dbId} className="border-b hover:bg-red-50 transition">
                                                            <td className="p-3">
                                                                <div className="font-bold text-gray-800">{u.nome}</div>
                                                                <div className="text-xs text-gray-500">Reg: {u.registro} | CPF: {u.documento}</div>
                                                                {u.nomeResponsavel && <div className="text-xs text-orange-600 font-bold mt-1">Resp: {u.nomeResponsavel}</div>}
                                                            </td>
                                                            <td className="p-3 text-right">
                                                                <button onClick={() => handleDeleteUser(u)} className="text-red-500 hover:text-red-700 font-black text-xs bg-red-100 px-3 py-2 rounded-lg"><i className="fas fa-trash-alt"></i> Excluir</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
